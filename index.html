    function TeamApp({ team, onBack, isEditor }) {

      const [players, setPlayers] = useState([]);
      const [gameStats, setGameStats] = useState({});
      const [playerStats, setPlayerStats] = useState({});
      const [loading, setLoading] = useState(true);

      const loadAll = useCallback(async () => {
        setLoading(true);
        const [gRes, pRes, gsRes, psRes] = await Promise.all([
          sb.from("games").select("*").eq("team_id", team.id),
          sb.from("players").select("*").eq("team_id", team.id).order("created_at"),
          sb.from("game_stats").select("*").eq("team_id", team.id),
          sb.from("player_stats").select("*").eq("team_id", team.id),
        ]);
        const monthOrder = {"Jan":0,"Feb":1,"Mar":2,"Apr":3,"May":4,"Jun":5,"Jul":6,"Aug":7,"Sep":8,"Oct":9,"Nov":10,"Dec":11};
        const parseDate = (g) => {
          try {
            const parts = (g.date || "").trim().split(" ");
            const month = monthOrder[parts[0]];
            const day = parseInt(parts[1]);
            if (month === undefined || isNaN(day)) return 9999;
            return month * 100 + day;
          } catch { return 9999; }
        };
        const sortedGames = (gRes.data || []).sort((a,b) => parseDate(a) - parseDate(b));
        setGames(sortedGames);
        setPlayers(pRes.data || []);
        const gs = {};
        (gsRes.data || []).forEach(s => { gs[s.game_id] = s; });
        setGameStats(gs);
        const ps = {};
        (psRes.data || []).forEach(s => {
          if (!ps[s.game_id]) ps[s.game_id] = {};
          ps[s.game_id][s.player_id] = s;
        });
        setPlayerStats(ps);
        setLoading(false);
      }, [team.id]);

      useEffect(() => { loadAll(); }, [loadAll]);

      const upsertGameStat = async (gameId, fields) => {
        const existing = gameStats[gameId];
        if (existing) {
          await sb.from("game_stats").update(fields).eq("id", existing.id);
        } else {
          await sb.from("game_stats").insert({ game_id: gameId, team_id: team.id, ...fields });
        }
        const { data } = await sb.from("game_stats").select("*").eq("game_id", gameId).eq("team_id", team.id).single();
        setGameStats(prev => ({ ...prev, [gameId]: data }));
      };

      const upsertPlayerStat = async (gameId, playerId, fields) => {
        const existing = playerStats[gameId]?.[playerId];
        if (existing) {
          await sb.from("player_stats").update(fields).eq("id", existing.id);
        } else {
          await sb.from("player_stats").insert({ game_id: gameId, player_id: playerId, team_id: team.id, ...fields });
        }
        const { data } = await sb.from("player_stats").select("*").eq("game_id", gameId).eq("player_id", playerId).single();
        setPlayerStats(prev => ({ ...prev, [gameId]: { ...(prev[gameId]||{}), [playerId]: data } }));
      };

      const addPlayer = async (name, number) => {
        const { data } = await sb.from("players").insert({ team_id: team.id, name, number }).select().single();
        if (data) setPlayers(prev => [...prev, data]);
      };

      const updatePlayer = async (id, name, number) => {
        await sb.from("players").update({ name, number }).eq("id", id);
        setPlayers(prev => prev.map(p => p.id===id ? {...p, name, number} : p));
      };

      const deletePlayer = async (id) => {
        await sb.from("players").delete().eq("id", id);
        setPlayers(prev => prev.filter(p => p.id !== id));
      };

      const getGS = (gameId) => gameStats[gameId] || { score_us:"", score_them:"", clean_sheet:false, mvp:"" };
      const getPS = (gameId, playerId) => playerStats[gameId]?.[playerId] || { goals:0, assists:0, yellow_cards:0, red_cards:0, clean_sheet:false, appeared:false };

      const totals = players.map(p => {
        let goals=0, assists=0, yellowCards=0, redCards=0, mvps=0, cleanSheets=0, appearances=0;
        Object.entries(playerStats).forEach(([gid, gps]) => {
          const ps = gps[p.id];
          if (ps) { goals+=ps.goals||0; assists+=ps.assists||0; yellowCards+=ps.yellow_cards||0; redCards+=ps.red_cards||0; if(ps.clean_sheet) cleanSheets++; if(ps.appeared) appearances++; }
        });
        Object.values(gameStats).forEach(gs => { if(gs.mvp===p.id) mvps++; });

      }).sort((a,b) => (b.goals+b.assists)-(a.goals+a.assists));

    // Calculate group standings from match results
    function calcGroupStandings(group, matchResults) {
      const teams = WC_GROUPS[group];
      const stats = {};
      teams.forEach(t => { stats[t] = { pts:0, gf:0, ga:0, gd:0, w:0, d:0, l:0 }; });

      GROUP_MATCHES.filter(m => m.group === group).forEach(m => {
        const r = matchResults[m.id];
        if (!r || r.home_score == null) return;
        const hs = r.home_score, as_ = r.away_score;
        stats[m.home].gf += hs; stats[m.home].ga += as_; stats[m.home].gd += hs-as_;
        stats[m.away].gf += as_; stats[m.away].ga += hs; stats[m.away].gd += as_-hs;
        if (hs > as_) { stats[m.home].pts+=3; stats[m.home].w++; stats[m.away].l++; }
        else if (hs === as_) { stats[m.home].pts++; stats[m.away].pts++; stats[m.home].d++; stats[m.away].d++; }
        else { stats[m.away].pts+=3; stats[m.away].w++; stats[m.home].l++; }
      });

      return Object.entries(stats)
        .sort((a,b) => b[1].pts-a[1].pts || b[1].gd-a[1].gd || b[1].gf-a[1].gf)
        .map(([name, s]) => ({ name, ...s }));
    }

        (resRes.data || []).forEach(r => { resMap[r.match_id] = r; });
        setResults(resMap);
        setLoading(false);
      }, []);

      useEffect(() => { loadAll(); }, [loadAll]);

      // Auto-fetch live scores every 5 minutes
      const fetchLiveScores = useCallback(async () => {
        setSyncing(true);
        try {
          const res = await fetch("/api/scores");
          const data = await res.json();
          if (!data.matches) { setSyncing(false); return; }
          setApiMatches(data.matches);

          const updates = [];
          for (const match of data.matches) {
            if (match.status !== "FINISHED" && match.status !== "IN_PLAY" && match.status !== "PAUSED") continue;
            const homeGoals = match.score?.fullTime?.home ?? match.score?.currentScore?.home;
            const awayGoals = match.score?.fullTime?.away ?? match.score?.currentScore?.away;
            if (homeGoals == null || awayGoals == null) continue;

            // Map API team names to our match IDs — BOTH teams must match the same fixture
            const homeName = (match.homeTeam?.name || "").toLowerCase();
            const awayName = (match.awayTeam?.name || "").toLowerCase();
            const norm = (s) => s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z]/g,"");
            // Canonical aliases: map every known API name variant to a single key.
            // Covers all 48 teams; safe because it only ADDS matches, never removes.
            const ALIASES = {
              // Group A
              "mexico":"mexico", "southafrica":"southafrica", "rsa":"southafrica",
              "southkorea":"southkorea","korearepublic":"southkorea","republicofkorea":"southkorea","korea":"southkorea","kor":"southkorea",
              "czechia":"czechia","czechrepublic":"czechia","cze":"czechia",
              // Group B
              "canada":"canada","can":"canada",
              "bosniaherzegovina":"bosniaherzegovina","bosniaandherzegovina":"bosniaherzegovina","bih":"bosniaherzegovina",
              "qatar":"qatar","qat":"qatar",
              "switzerland":"switzerland","sui":"switzerland","s)":"switzerland",
              // Group C
              "brazil":"brazil","bra":"brazil",
              "morocco":"morocco","mar":"morocco",
              "haiti":"haiti","hai":"haiti",
              "scotland":"scotland","sco":"scotland",
              // Group D
              "usa":"usa","unitedstates":"usa","unitedstatesofamerica":"usa","us":"usa","usmnt":"usa",
              "paraguay":"paraguay","par":"paraguay",
              "australia":"australia","aus":"australia",
              "turkey":"turkey","turkiye":"turkey","tur":"turkey",
              // Group E
              "germany":"germany","ger":"germany",
              "curacao":"curacao","cuw":"curacao",
              "ivorycoast":"ivorycoast","cotedivoire":"ivorycoast","civ":"ivorycoast",
              "ecuador":"ecuador","ecu":"ecuador",
              // Group F
              "netherlands":"netherlands","holland":"netherlands","ned":"netherlands",
              "japan":"japan","jpn":"japan",
              "sweden":"sweden","swe":"sweden",
              "tunisia":"tunisia","tun":"tunisia",
              // Group G
              "belgium":"belgium","bel":"belgium",
              "egypt":"egypt","egy":"egypt",
              "iran":"iran","irislamicrepublicofiran":"iran","iranislamicrepublic":"iran","irn":"iran",
              "newzealand":"newzealand","nzl":"newzealand",
              // Group H
              "spain":"spain","esp":"spain",
              "capeverde":"capeverde","caboverde":"capeverde","capeverdeislands":"capeverde","cpv":"capeverde",
              "saudiarabia":"saudiarabia","ksa":"saudiarabia",
              "uruguay":"uruguay","uru":"uruguay",
              // Group I
              "france":"france","fra":"france",
              "senegal":"senegal","sen":"senegal",
              "iraq":"iraq","irq":"iraq",
              "norway":"norway","nor":"norway",
              // Group J
              "argentina":"argentina","arg":"argentina",
              "algeria":"algeria","alg":"algeria",
              "austria":"austria","aut":"austria",
              "jordan":"jordan","jor":"jordan",
              // Group K
              "portugal":"portugal","por":"portugal",
              "drcongo":"drcongo","democraticrepublicofthecongo":"drcongo","congodr":"drcongo","cod":"drcongo",
              "uzbekistan":"uzbekistan","uzb":"uzbekistan",
              "colombia":"colombia","col":"colombia",
              // Group L
              "england":"england","eng":"england",
              "croatia":"croatia","cro":"croatia",
              "ghana":"ghana","gha":"ghana",
              "panama":"panama","pan":"panama",
            };
            const canon = (s) => { const n = norm(s); return ALIASES[n] || n; };
            const teamsMatch = (apiName, ourName) => {
              const a = canon(apiName), o = canon(ourName);
              return a === o;
            };
            // Try home-away orientation, then swapped (in case API lists teams in different order)
            let foundMatch = GROUP_MATCHES.find(m =>
              (teamsMatch(homeName, m.home) && teamsMatch(awayName, m.away))
            );
            let swapped = false;
            if (!foundMatch) {
              foundMatch = GROUP_MATCHES.find(m =>
                (teamsMatch(homeName, m.away) && teamsMatch(awayName, m.home))
              );
              swapped = !!foundMatch;
            }
            // KNOCKOUT matching: slots are codes (RU-A, W-D, 3rd-BEFIJ), not team names,
            // so resolve each knockout slot to its ACTUAL team using real results, then
            // match the API's two teams against those resolved teams (either orientation).
            if (!foundMatch) {
              const realGroupResults = {};
              GROUP_MATCHES.forEach(m => { if (results[m.id]?.home_score != null) realGroupResults[m.id] = results[m.id]; });
              for (const km of KNOCKOUT_MATCHES) {
                const t = resolveKnockoutTeams(km.id, {}, realGroupResults, results);
                if (!t || t.home === "TBD" || t.away === "TBD") continue;
                if (teamsMatch(homeName, t.home) && teamsMatch(awayName, t.away)) { foundMatch = km; swapped = false; break; }
                if (teamsMatch(homeName, t.away) && teamsMatch(awayName, t.home)) { foundMatch = km; swapped = true; break; }
              }
            }
            if (!foundMatch) continue;
            // Align scores to OUR home/away orientation
            const ourHome = swapped ? awayGoals : homeGoals;
            const ourAway = swapped ? homeGoals : awayGoals;
            updates.push({ matchId: foundMatch.id, home: ourHome, away: ourAway });
          }

          // Save all updates to Supabase
          for (const u of updates) {
            const existing = results[u.matchId];
            if (existing) {
              await sb.from("wc_results").update({ home_score: u.home, away_score: u.away, updated_at: new Date().toISOString() }).eq("id", existing.id);
            } else {
              await sb.from("wc_results").insert({ match_id: u.matchId, home_score: u.home, away_score: u.away });
            }
          }

          if (updates.length > 0) await loadAll();
          setLastSync(new Date());
        } catch(e) {
          console.error("Score fetch failed:", e);
        }
        setSyncing(false);
      }, [results, loadAll]);

      useEffect(() => {
        fetchLiveScores();
        const interval = setInterval(fetchLiveScores, 5 * 60 * 1000);
        return () => clearInterval(interval);
      }, []);

      useEffect(() => { loadAll(); }, [loadAll]);

      const [myLocked, setMyLocked] = useState(() => localStorage.getItem("wc_locked") === "true");

      const joinBracket = async () => {
        const name = nameInput.trim();
        if (!name) return;

        // Check if this name already exists (case-insensitive)
        const { data: existing } = await sb.from("wc_participants").select("*").ilike("name", name);
        if (existing && existing.length > 0) {
          const match = existing[0];
          const resume = confirm(`"${match.name}" already has a bracket. Tap OK to resume and edit it, or Cancel to pick a different name.`);
          if (resume) {

            }
            setMyName(match.name);
            setMyId(match.id);
            localStorage.setItem("wc_name", match.name);
            localStorage.setItem("wc_id", match.id);
            localStorage.setItem("wc_locked", "false");
            setMyLocked(false);
            setNameInput("");
            await loadAll();
          }
          return;
        }

        // New name — create entry
        const { data, error } = await sb.from("wc_participants").insert({ name }).select().single();
        if (!error && data) {
          setMyName(data.name);
          setMyId(data.id);
          localStorage.setItem("wc_name", data.name);
          localStorage.setItem("wc_id", data.id);
          localStorage.setItem("wc_locked", "false");
          setMyLocked(false);
          setNameInput("");
          await loadAll();
        }
      };

      // Viewing context — defined before lock logic that depends on it.
      // When viewing someone else's bracket, myPreds reflects THAT person's predictions.
      const viewingPerson = viewingId ? participants.find(p => p.id === viewingId) : null;
      const displayId = viewingId || myId;

      const isViewingOther = viewingId && viewingId !== myId;

      const effectiveLocked = myLocked || kickoffPassed;
      // One-off knockout edit override: only the matching person, group picks stay locked.
      // Normalize both names to letters-only so dashes/spaces/case never block the match.
      const normNm = (s) => (s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9]/g,"");
      const selfKoEdit = !!myId && !!EDIT_OVERRIDE_NAME &&
        normNm(myName) === normNm(EDIT_OVERRIDE_NAME);
      // Editor fallback: when an editor is viewing another person's bracket, they may
      // fill in that person's KNOCKOUT picks on their behalf (e.g. the person can't do it).
      const adminKoEdit = !!isEditor && !!isViewingOther && !!viewingId;
      const koEditAllowed = selfKoEdit || adminKoEdit;
      // For knockout cards specifically, allow editing if either not locked, or an override applies.
      const koLocked = (effectiveLocked || isViewingOther) && !koEditAllowed;

      const lockBracket = async () => {
        if (!myId || myLocked) return;
        if (!confirm("Are you sure? Once locked your predictions can't be changed!")) return;
        // Reload predictions from DB to confirm everything saved
        const { data: savedPreds } = await sb.from("wc_predictions").select("*").eq("participant_id", myId);
        const savedCount = (savedPreds || []).length;
        if (savedCount === 0) {
          alert("No predictions were saved! Please re-enter your bracket before locking. (Check your internet connection.)");
          return;
        }
        // Warn if the bracket looks incomplete (72 group games is a full set)
        if (savedCount < 72) {
          if (!confirm(`Only ${savedCount} predictions saved (a full bracket has many more). Some picks may not have saved. Lock anyway?`)) return;
        } else if (!confirm(`${savedCount} predictions saved to the server. Lock in your bracket now?`)) {
          return;
        }
        const { error } = await sb.from("wc_participants").update({ locked: true }).eq("id", myId);
        if (error) { alert("Couldn't lock — try again."); return; }
        setMyLocked(true);
        localStorage.setItem("wc_locked", "true");
        await loadAll();
      };

      const deleteParticipant = async (id, name) => {
        if (!isEditor) return;

        await sb.from("wc_predictions").delete().eq("participant_id", id);
        await sb.from("wc_participants").delete().eq("id", id);
        if (id === myId) { localStorage.removeItem("wc_id"); localStorage.removeItem("wc_name"); localStorage.removeItem("wc_locked"); }
        await loadAll();
      };

      const [saveError, setSaveError] = useState(false);

      const savePrediction = async (matchId, homeScore, awayScore) => {
        if (!myId || effectiveLocked) return;
        // Optimistic UI update
        setPredictions(prev => ({
          ...prev,
          [myId]: { ...(prev[myId]||{}), [matchId]: { ...(prev[myId]?.[matchId]||{}), match_id: matchId, home_score: homeScore, away_score: awayScore }}
        }));
        try {
          const existing = predictions[myId]?.[matchId];
          if (existing?.id) {
            const { error } = await sb.from("wc_predictions").update({ home_score: homeScore, away_score: awayScore }).eq("id", existing.id);
            if (error) throw error;
          } else {
            // upsert to avoid duplicate-key races
            const { data, error } = await sb.from("wc_predictions")
              .upsert({ participant_id: myId, match_id: matchId, home_score: homeScore, away_score: awayScore }, { onConflict: "participant_id,match_id" })
              .select().single();
            if (error) throw error;
            if (data) {
              setPredictions(prev => ({ ...prev, [myId]: { ...(prev[myId]||{}), [matchId]: data }}));
            }
          }
          setSaveError(false);
        } catch (e) {
          console.error("Save failed:", e);
          setSaveError(true);
        }
      };

      const saveResult = async (matchId, homeScore, awayScore) => {
        const existing = results[matchId];
        if (existing) {
          await sb.from("wc_results").update({ home_score: homeScore, away_score: awayScore, updated_at: new Date().toISOString() }).eq("id", existing.id);
        } else {
          await sb.from("wc_results").insert({ match_id: matchId, home_score: homeScore, away_score: awayScore });
        }
        setResults(prev => ({ ...prev, [matchId]: { ...(prev[matchId]||{}), match_id: matchId, home_score: homeScore, away_score: awayScore }}));
      };

      const calcPoints = (participantId) => {
        let pts = 0;
        const preds = predictions[participantId] || {};

        // Resolve this participant's bracket path purely from THEIR predictions
        const pGroupResults = {};
        GROUP_MATCHES.forEach(m => {
          const pred = preds[m.id];
          if (pred?.home_score != null) pGroupResults[m.id] = pred;
        });

        // Group stage scoring
        GROUP_MATCHES.forEach(m => {
          const pred = preds[m.id];
          const res = results[m.id];
          if (!pred || res?.home_score == null || res?.away_score == null) return;
          const predWinner = pred.home_score > pred.away_score ? "home" : pred.home_score < pred.away_score ? "away" : "draw";
          const resWinner = res.home_score > res.away_score ? "home" : res.home_score < res.away_score ? "away" : "draw";
          if (predWinner === resWinner) pts += 2;
          if (pred.home_score === res.home_score && pred.away_score === res.away_score) pts += 1;
        });

        // Knockout scoring (ROUND-BASED, escalating points like March Madness):
        // for each round, award that round's point value for each team the participant
        // picked to win in that round that actually won a match in that round.
        // Round-based (not exact-slot) keeps it forgiving: right team still scores even
        // if their bracket path differed. Doubling per round makes deep picks matter most.
        const KO_ROUND_PTS = { R32: 1, R16: 2, QF: 4, SF: 8, F: 16 };
        const rounds = ["R32","R16","QF","SF","F"];
        // Resolve actual teams using real group results + real knockout results
        const realGroupResults = {};
        GROUP_MATCHES.forEach(m => { if (results[m.id]?.home_score != null) realGroupResults[m.id] = results[m.id]; });

        rounds.forEach(round => {
          const roundMatches = KNOCKOUT_MATCHES.filter(m => m.stage === round);
          const roundPts = KO_ROUND_PTS[round] || 1;

          // Teams the participant picked to win in this round
          const myWinners = new Set();
          roundMatches.forEach(m => {
            const pred = preds[m.id];
            if (!pred || pred.home_score == null) return;
            const myTeams = resolveKnockoutTeams(m.id, preds, pGroupResults, preds);
            const w = pred.home_score > pred.away_score ? myTeams.home : myTeams.away;
            if (w && w !== "TBD") myWinners.add(w);
          });

          // Teams that actually won in this round (from real results)
          const actualWinners = new Set();
          roundMatches.forEach(m => {
            const res = results[m.id];
            if (!res || res.home_score == null) return;
            const actualTeams = resolveKnockoutTeams(m.id, preds, realGroupResults, results);
            const w = res.home_score > res.away_score ? actualTeams.home : actualTeams.away;
            if (w && w !== "TBD") actualWinners.add(w);
          });

          // Award this round's point value per correctly-predicted advancing team
          myWinners.forEach(team => {
            if (actualWinners.has(team)) pts += roundPts;
          });
        });
        return pts;
      };

      const leaderboard = participants.map(p => ({ ...p, points: calcPoints(p.id) }))
        .sort((a,b) => b.points - a.points);

      const saveKnockoutPick = async (matchId, winner) => {
        if (koLocked) return;
        // Target the person whose bracket is shown: the viewed person when an editor is
        // filling in on their behalf, otherwise the logged-in user.
        const targetId = (adminKoEdit ? viewingId : myId);
        if (!targetId) return;
        // Store winner as home_score=1 away_score=0 if home wins, 0-1 if away
        const homeScore = winner === "home" ? 1 : 0;
        const awayScore = winner === "away" ? 1 : 0;
        // Optimistic update
        setPredictions(prev => ({
          ...prev,
          [targetId]: { ...(prev[targetId]||{}), [matchId]: { match_id: matchId, home_score: homeScore, away_score: awayScore } }
        }));
        try {
          const { error } = await sb.from("wc_predictions").upsert(
            { participant_id: targetId, match_id: matchId, home_score: homeScore, away_score: awayScore },
            { onConflict: "participant_id,match_id" }
          );
          if (error) { setSaveError(true); }
        } catch (e) { setSaveError(true); }
      };

      const groupMatches = GROUP_MATCHES.filter(m => m.group === activeGroup);
      // When viewing someone else's bracket, show their preds (read-only)

      return (
        <div style={{ minHeight:"100vh", background:"linear-gradient(135deg,#0a1628 0%,#0d2347 50%,#0a1628 100%)", fontFamily:"'Bebas Neue','Impact',sans-serif", color:"#e8f4fd" }}>
          {/* Header */}
          <div style={{ background:"rgba(218,165,32,0.08)", borderBottom:"1px solid rgba(218,165,32,0.2)", padding:"0 20px" }}>
            <div style={{ maxWidth:720, margin:"0 auto" }}>
              <div style={{ padding:"16px 0 6px", display:"flex", alignItems:"center", gap:12 }}>
                <button onClick={onBack} style={{ background:"none", border:"none", color:"#fbbf24", cursor:"pointer", fontFamily:"Barlow", fontSize:13, padding:0 }}>← BACK</button>
              </div>
              <div style={{ fontSize:30, letterSpacing:3, color:"#fbbf24", lineHeight:1 }}>🏆 2026 FIFA WORLD CUP</div>
              <div style={{ display:"flex", alignItems:"center", gap:10, marginTop:4, marginBottom:10 }}>
                <div style={{ fontSize:13, fontFamily:"Barlow", color:"#94a3b8" }}>BRACKET CHALLENGE</div>
                <div style={{ display:"flex", alignItems:"center", gap:6, fontFamily:"Barlow", fontSize:11 }}>
                  {syncing ? (
                    <><div className="spinner" style={{ width:10, height:10, borderWidth:1 }} /><span style={{ color:"#4db8ff" }}>Syncing scores...</span></>
                  ) : lastSync ? (
                    <span style={{ color:"#334155" }}>● Last sync {lastSync.toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"})}</span>
                  ) : null}
                  <button onClick={fetchLiveScores} style={{ background:"none", border:"1px solid #334155", borderRadius:4, color:"#475569", padding:"2px 8px", cursor:"pointer", fontFamily:"Barlow", fontSize:11 }}>↻ Sync</button>
                </div>
              </div>
              <div style={{ display:"flex", overflowX:"auto", gap:0 }}>
                {["daily","live","thirds","leaderboard","bracket",...(isEditor?["admin"]:[])] .map(v => (
                  <button key={v} className="nav-btn" onClick={() => { setWcView(v); setViewingId(null); }}
                    style={{ color:wcView===v?"#fbbf24":"#64748b", borderBottom:wcView===v?"2px solid #fbbf24":"2px solid transparent", fontSize:16 }}>
                    {v.toUpperCase()}
                  </button>
                ))}
              </div>
            </div>
          </div>

          <div style={{ maxWidth:720, margin:"0 auto", padding:"20px 20px" }}>

            {/* Join banner */}
            {!myId && wcView === "bracket" && !kickoffPassed && (
              <div style={{ background:"rgba(251,191,36,0.1)", border:"1px solid rgba(251,191,36,0.3)", borderRadius:10, padding:"20px", marginBottom:20 }}>
                <div style={{ fontFamily:"Bebas Neue", fontSize:22, color:"#fbbf24", marginBottom:12 }}>JOIN THE BRACKET</div>
                <div style={{ display:"flex", gap:10 }}>

                </div>

                    : <span>👁 Viewing <strong>{viewingPerson?.name}</strong>'s bracket · {calcPoints(viewingId)} pts</span>}
                </div>

                  ← BACK
                </button>
              </div>
            )}

            {saveError && wcView === "bracket" && !isViewingOther && (
              <div style={{ background:"rgba(248,113,113,0.15)", border:"1px solid #f87171", borderRadius:8, padding:"10px 16px", marginBottom:12, fontFamily:"Barlow", fontSize:13, color:"#f87171", textAlign:"center" }}>
                ⚠️ A pick didn't save — check your connection and re-tap it before locking.
              </div>

            {/* Kickoff countdown */}
            {wcView === "bracket" && !isViewingOther && (() => {
              if (kickoffPassed) {
                return (
                  <div style={{ background:"rgba(248,113,113,0.1)", border:"1px solid rgba(248,113,113,0.3)", borderRadius:8, padding:"10px 16px", marginBottom:12, textAlign:"center", fontFamily:"Bebas Neue", fontSize:16, letterSpacing:1, color:"#f87171" }}>
                    🔒 TOURNAMENT STARTED — BRACKETS LOCKED
                  </div>
                );
              }
              const diff = KICKOFF - now;
              const d = Math.floor(diff/(1000*60*60*24));
              const h = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
              const m = Math.floor((diff%(1000*60*60))/(1000*60));
              const s = Math.floor((diff%(1000*60))/1000);
              return (
                <div style={{ background:"rgba(251,191,36,0.1)", border:"1px solid rgba(251,191,36,0.3)", borderRadius:8, padding:"12px 16px", marginBottom:12, textAlign:"center" }}>
                  <div style={{ fontFamily:"Barlow", fontSize:11, color:"#94a3b8", letterSpacing:2, marginBottom:4 }}>⏱ BRACKETS LOCK AT KICKOFF</div>
                  <div style={{ fontFamily:"Bebas Neue", fontSize:26, color:"#fbbf24", letterSpacing:2 }}>
                    {d}d {h}h {m}m {s}s
                  </div>
                </div>
              );
            })()}

            {myId && wcView === "bracket" && !isViewingOther && (
              <div style={{ background: koLocked?"rgba(248,113,113,0.08)":"rgba(74,222,128,0.08)", border:`1px solid ${koLocked?"rgba(248,113,113,0.2)":"rgba(74,222,128,0.2)"}`, borderRadius:8, padding:"10px 16px", marginBottom:16, display:"flex", justifyContent:"space-between", alignItems:"center", gap:8, flexWrap:"wrap" }}>

                  const apiHasGame = (homeTeam, awayTeam) => {

                    return (apiMatches||[]).some(am => {
                      const ah = normT(am.homeTeam?.name), aa = normT(am.awayTeam?.name);
                      return (ah===h && aa===a) || (ah===a && aa===h);

    // Resolve who plays in a knockout match based on picks and group results
    function resolveKnockoutTeams(matchId, preds, groupResults, koResults, allowPartial) {
      const match = KNOCKOUT_MATCHES.find(m => m.id === matchId);
      if (!match) return { home: "TBD", away: "TBD" };

      if (match.stage === "R32") {
        return {
          home: resolveSlot(match.home, groupResults, match.id, allowPartial),
          away: resolveSlot(match.away, groupResults, match.id, allowPartial),
        };
      }

      const getWinner = (feedId) => {
        const res = koResults[feedId];
        const pred = preds[feedId];
        const teams = resolveKnockoutTeams(feedId, preds, groupResults, koResults, allowPartial);
        if (res?.home_score != null) {
          return res.home_score > res.away_score ? teams.home : teams.away;
        }
        if (pred?.home_score != null) {
          return pred.home_score > pred.away_score ? teams.home : teams.away;
        }
        // Game not decided yet. In live/actual mode, show a descriptive placeholder
        // like "Winner USA/Bosnia" once both feeding teams are known.
        if (allowPartial) {
          const h = teams.home, a = teams.away;
          const known = (t) => t && t !== "TBD" && !t.includes("Winner") && !t.includes("3rd") && !t.includes("Place") && !t.includes("1st") && !t.includes("2nd");
          if (known(h) && known(a)) return `Winner ${h}/${a}`;
        }
        return "TBD";
      };

      return {
        home: getWinner(match.feedHome),
        away: getWinner(match.feedAway),
      };
    }

        const n = (s||"").toLowerCase()
          .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
          .replace(/[^a-z]/g,"");
        const map = {
          "unitedstates":"usa","us":"usa","unitedstatesofamerica":"usa",
          "korearepublic":"southkorea","republicofkorea":"southkorea","korea":"southkorea",

          "irislamicrepublicofiran":"iran","iranislamicrepublic":"iran",

          "democraticrepublicofthecongo":"drcongo","congodr":"drcongo","congo":"drcongo","drcongo":"drcongo",
          "caboverde":"capeverde","capeverdeislands":"capeverde",
          "bosniaandherzegovina":"bosniaherzegovina","bosnia":"bosniaherzegovina",
          "turkiye":"turkey",
          "curacao":"curacao",
        };
        return map[n] || n;
      };
      const ch = canonTeam(home), ca = canonTeam(away);

      // assign each key's player to the correct displayed team even when the stored
      // key order is reversed from the displayed home/away order.

      }
      if (!preview) return null;
      // homeKey always describes the FIRST team in the stored key. If the stored key
      // is flipped vs the displayed order, the displayed home team's player is awayKey.
      const homeSideKey = flipped ? preview.awayKey : preview.homeKey;
      const awaySideKey = flipped ? preview.homeKey : preview.awayKey;

      return (
        <div style={{ marginTop:8 }}>
          <button onClick={() => setOpen(!open)} style={{ background:"rgba(77,184,255,0.1)", border:"1px solid rgba(77,184,255,0.3)", borderRadius:6, color:"#4db8ff", padding:"5px 12px", cursor:"pointer", fontFamily:"Barlow", fontSize:12, fontWeight:600 }}>

              <div style={{ fontFamily:"Barlow", fontSize:13, color:"#cbd5e1", lineHeight:1.5, marginBottom:12 }}>{preview.outlook}</div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
                {[{side:home,k:homeSideKey},{side:away,k:awaySideKey}].map(({side,k},idx) => (

    function DailySummary({ apiMatches, results, predictions, participants, leaderboard, calcPoints }) {
      // Helpers to map API match to our match id + names
      const canonName = (s) => {
        const n = (s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z]/g,"");
        const map = {
          "unitedstates":"usa","us":"usa","unitedstatesofamerica":"usa","usmnt":"usa",
          "korearepublic":"southkorea","republicofkorea":"southkorea","korea":"southkorea",
          "czechrepublic":"czechia",
          "irislamicrepublicofiran":"iran","iranislamicrepublic":"iran",
          "cotedivoire":"ivorycoast",
          "democraticrepublicofthecongo":"drcongo","congodr":"drcongo","congo":"drcongo",
          "caboverde":"capeverde","capeverdeislands":"capeverde",
          "bosniaandherzegovina":"bosniaherzegovina","bosnia":"bosniaherzegovina",
          "turkiye":"turkey","saudiarabia":"saudiarabia","newzealand":"newzealand","southafrica":"southafrica",
        };
        return map[n] || n;
      };
      const findOurMatch = (apiMatch) => {
        const h = canonName(apiMatch.homeTeam?.name), a = canonName(apiMatch.awayTeam?.name);
        return GROUP_MATCHES.find(m => {
          const mh = canonName(m.home), ma = canonName(m.away);
          return (mh===h && ma===a) || (mh===a && ma===h);
        });
      };

      const now = new Date();
      const todayStr = now.toDateString();
      const yesterday = new Date(now); yesterday.setDate(yesterday.getDate()-1);
      const yestStr = yesterday.toDateString();

      const todays = [], yesterdays = [];
      (apiMatches||[]).forEach(am => {
        if (!am.utcDate) return;
        const d = new Date(am.utcDate);
        const ds = d.toDateString();
        const entry = {
          home: am.homeTeam?.name || "TBD",
          away: am.awayTeam?.name || "TBD",
          time: d.toLocaleTimeString([], {hour:"numeric", minute:"2-digit"}),
          status: am.status,
          hs: am.score?.fullTime?.home,
          as: am.score?.fullTime?.away,
        };
        if (ds === todayStr) todays.push(entry);
        else if (ds === yestStr) yesterdays.push(entry);
      });

      // Yesterday's prediction analysis: for each finished game yesterday, how many got it right
      // Analyze a game (live or finished) for how many predicted it right
      const analyzeGame = (g) => {
        // Match our game directly using canonical names (handles API name variants
        // and home/away order differences)
        const gh = canonName(g.home), ga = canonName(g.away);
        let our = null, swapped = false;
        for (const m of GROUP_MATCHES) {
          const mh = canonName(m.home), ma = canonName(m.away);
          if (mh===gh && ma===ga) { our = m; swapped = false; break; }
          if (mh===ga && ma===gh) { our = m; swapped = true; break; }
        }
        let correct = 0, exact = 0, total = 0;
        if (our && g.hs != null) {
          // Align the real score to OUR home/away orientation
          const realHome = swapped ? g.as : g.hs;
          const realAway = swapped ? g.hs : g.as;
          participants.forEach(p => {
            const pred = predictions[p.id]?.[our.id];
            if (!pred || pred.home_score == null) return;
            total++;
            const pw = pred.home_score>pred.away_score?"h":pred.home_score<pred.away_score?"d":"a";
            const rw = realHome>realAway?"h":realHome<realAway?"d":"a";
            if (pw===rw) correct++;
            if (pred.home_score===realHome && pred.away_score===realAway) exact++;
          });
        }
        return { correct, exact, total };
      };

      const yestAnalysis = yesterdays.filter(g => g.hs != null).map(g => ({ ...g, ...analyzeGame(g) }));

      const sectionTitle = { fontFamily:"Barlow", fontSize:11, fontWeight:700, letterSpacing:2, color:"#fbbf24", textTransform:"uppercase", marginBottom:10, marginTop:24 };
      const card = { background:"rgba(255,255,255,0.03)", border:"1px solid rgba(255,255,255,0.06)", borderRadius:8, padding:"12px 14px", marginBottom:8 };

      return (
        <div>
          <div style={{ fontFamily:"Bebas Neue", fontSize:26, color:"#fbbf24", letterSpacing:2 }}>📅 DAILY REPORT</div>
          <div style={{ fontFamily:"Barlow", fontSize:13, color:"#94a3b8", marginBottom:8 }}>{dateLabel}</div>

          {/* Today's games */}
          <div style={sectionTitle}>⚽ Today's Matches</div>
          {todays.length === 0 ? (
            <div style={{ fontFamily:"Barlow", fontSize:13, color:"#475569" }}>No World Cup matches scheduled today.</div>
          ) : todays.map((g,i) => {
            const live = g.status==="IN_PLAY" || g.status==="PAUSED";
            const done = g.status==="FINISHED";
            const a = (live || done) ? analyzeGame(g) : null;
            return (
              <div key={i} style={card}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom: a&&a.total>0?6:0 }}>
                  <div style={{ fontFamily:"Barlow", fontSize:14, fontWeight:600, color:"#e2e8f0" }}>{g.home} {g.hs!=null?g.hs:""} {g.hs!=null?"-":"vs"} {g.as!=null?g.as:""} {g.away}</div>
                  <div style={{ fontFamily:"Bebas Neue", fontSize:14, color: live?"#4ade80": done?"#94a3b8":"#4db8ff", display:"flex", alignItems:"center", gap:4 }}>
                    {live && <span style={{ width:7, height:7, borderRadius:"50%", background:"#4ade80", display:"inline-block", animation:"pulse 1.5s infinite" }}></span>}
                    {live ? "LIVE" : done ? "FT" : g.time}
                  </div>
                </div>
                {a && a.total > 0 && (
                  <div style={{ fontFamily:"Barlow", fontSize:12, color:"#94a3b8" }}>
                    <span style={{ color:"#4ade80" }}>{a.correct}/{a.total}</span> {live?"currently have":"got"} the result right
                    {a.exact > 0 && <span style={{ color:"#fbbf24" }}> · {a.exact} on the exact score 🎯</span>}
                  </div>
                )}
                {!live && !done && <GamePreview home={g.home} away={g.away} />}
              </div>
            );
          })}

          {/* Yesterday's recap */}
          <div style={sectionTitle}>📊 Yesterday's Results</div>
          {yestAnalysis.length === 0 ? (
            <div style={{ fontFamily:"Barlow", fontSize:13, color:"#475569" }}>No completed matches yesterday.</div>
          ) : yestAnalysis.map((g,i) => (
            <div key={i} style={card}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom: g.total>0?6:0 }}>
                <div style={{ fontFamily:"Barlow", fontSize:14, fontWeight:600, color:"#e2e8f0" }}>{g.home} {g.hs}-{g.as} {g.away}</div>
              </div>
              {g.total > 0 && (
                <div style={{ fontFamily:"Barlow", fontSize:12, color:"#94a3b8" }}>
                  <span style={{ color:"#4ade80" }}>{g.correct}/{g.total}</span> picked the result right
                  {g.exact > 0 && <span style={{ color:"#fbbf24" }}> · {g.exact} nailed the exact score 🎯</span>}
                </div>
              )}
            </div>
          ))}

          {/* Leaderboard status */}
          <div style={sectionTitle}>🏆 Leaderboard</div>
          {leader ? (
            <div>
              <div style={{ ...card, background:"rgba(251,191,36,0.08)", border:"1px solid rgba(251,191,36,0.25)" }}>
                <div style={{ fontFamily:"Barlow", fontSize:13, color:"#fbbf24" }}>
                  👑 <strong>{leader.name}</strong> leads with <strong>{leader.points} pts</strong>
                </div>
              </div>
              {leaderboard.slice(0,5).map((p,i) => (
                <div key={p.id} style={{ display:"flex", alignItems:"center", gap:12, padding:"10px 14px", borderRadius:8, marginBottom:5, background:"rgba(255,255,255,0.03)", border:"1px solid rgba(255,255,255,0.06)" }}>
                  <div style={{ fontFamily:"Bebas Neue", fontSize:18, color:i<3?["#fbbf24","#94a3b8","#b45309"][i]:"#334155", minWidth:20, textAlign:"center" }}>{i+1}</div>
                  <div style={{ flex:1, fontFamily:"Barlow", fontSize:14, fontWeight:600, color:"#e2e8f0" }}>{p.name}</div>
                  <div style={{ fontFamily:"Bebas Neue", fontSize:20, color:"#fbbf24" }}>{p.points}</div>
                </div>
              ))}
            </div>
          ) : (
            <div style={{ fontFamily:"Barlow", fontSize:13, color:"#475569" }}>No participants yet.</div>
          )}
        </div>
      );
    }

    function ThirdPlaceTab({ results }) {
      // Compute each group's current 3rd-place team from real results.
      const thirds = [];
      Object.keys(WC_GROUPS).forEach(g => {
        const ids = GROUP_MATCHES.filter(m => m.group === g).map(m => m.id);
        const played = ids.filter(id => results[id]?.home_score != null).length;
        if (played === 0) return; // group hasn't started
        const standings = calcGroupStandings(g, results);
        if (standings[2]) thirds.push({ ...standings[2], group: g, played, total: ids.length });
      });
      // Rank by FIFA criteria: pts, GD, GF
      const ranked = [...thirds].sort((a,b) => b.pts-a.pts || b.gd-a.gd || b.gf-a.gf);

      const row = (t, i) => {

              <div style={{ fontFamily:"Barlow", fontSize:10, color:"#64748b" }}>{t.pts} pts · GD {t.gd>0?"+":""}{t.gd} · {t.gf} GF{!complete?` · ${t.played}/${t.total} played`:""}</div>
            </div>
            <div style={{ fontFamily:"Barlow", fontSize:10, fontWeight:700, color:advancing?"#4ade80":"#f87171" }}>{advancing?"IN":"OUT"}</div>
          </div>
        );
      };

      return (
        <div>
          <div style={{ fontFamily:"Bebas Neue", fontSize:26, color:"#fbbf24", letterSpacing:2 }}>🥉 3RD PLACE RACE</div>
          <div style={{ fontFamily:"Barlow", fontSize:13, color:"#94a3b8", marginBottom:16, lineHeight:1.5 }}>
            The 8 best third-place teams join the knockouts.
          </div>

          {/* Explainer */}
          <div style={{ background:"rgba(77,184,255,0.06)", border:"1px solid rgba(77,184,255,0.15)", borderRadius:8, padding:"12px 14px", marginBottom:18 }}>
            <div style={{ fontFamily:"Bebas Neue", fontSize:15, color:"#4db8ff", letterSpacing:1, marginBottom:6 }}>HOW IT WORKS</div>
            <div style={{ fontFamily:"Barlow", fontSize:12.5, color:"#cbd5e1", lineHeight:1.6 }}>
              With 48 teams in 12 groups, the top 2 from each group advance automatically (24 teams). To fill the 32-team Round of 32, the <b style={{color:"#fbbf24"}}>8 best third-place teams</b> also go through — only the 4 worst thirds go home.
              <br/><br/>
              All 12 third-place teams are ranked in one table by: <b>1)</b> points, <b>2)</b> goal difference, <b>3)</b> goals scored, <b>4)</b> team conduct (fewest cards), <b>5)</b> FIFA ranking. The top 8 qualify.
              <br/><br/>
              In the bracket, <b style={{color:"#fbbf24"}}>8 of the 12 group winners</b> are matched against these third-place teams in the Round of 32 (e.g. "1st E vs 3rd from A/B/C/D/F"). Exactly which third-placer lands in which slot depends on which groups they come from — FIFA's Annex C maps all 495 combinations so two teams from the same group can't meet again until the quarterfinals.
            </div>
          </div>

          {/* Live table */}
          <div style={{ fontFamily:"Bebas Neue", fontSize:15, color:"#fbbf24", letterSpacing:1, marginBottom:8 }}>
            IN THE HUNT {ranked.length>0 && <span style={{fontFamily:"Barlow",fontSize:11,color:"#64748b",fontWeight:400}}>· top 8 advance (green)</span>}
          </div>
          {ranked.length === 0 ? (
            <div style={{ fontFamily:"Barlow", fontSize:13, color:"#64748b", padding:"16px", textAlign:"center", background:"rgba(255,255,255,0.02)", borderRadius:8 }}>
              No group games played yet. The 3rd-place race fills in as results come in.
            </div>
          ) : (
            <div>
              {ranked.map((t,i) => row(t,i))}
              {ranked.length < 12 && (
                <div style={{ fontFamily:"Barlow", fontSize:11, color:"#475569", marginTop:8, fontStyle:"italic" }}>

            Note: standings shift as games are played. Conduct (cards) and FIFA-ranking tiebreakers aren't fully modeled here, so teams level on points/GD/GF may reorder slightly once those apply.

    }

    function KnockoutBracket({ myPreds, results, onPredict, locked, actualMode }) {
      const stages = [
        { key:"R32", label:"Round of 32", matches: KNOCKOUT_MATCHES.filter(m=>m.stage==="R32") },
        { key:"R16", label:"Round of 16", matches: KNOCKOUT_MATCHES.filter(m=>m.stage==="R16") },
        { key:"QF",  label:"Quarter Finals", matches: KNOCKOUT_MATCHES.filter(m=>m.stage==="QF") },
        { key:"SF",  label:"Semi Finals", matches: KNOCKOUT_MATCHES.filter(m=>m.stage==="SF") },
        { key:"F",   label:"🏆 Final", matches: KNOCKOUT_MATCHES.filter(m=>m.stage==="F") },
      ];

      // Order matches by the bracket TREE rather than by ID, so that the two games
      // feeding each later-round match sit directly adjacent and lines never cross.
      // We do a depth-first traversal from the Final back through the feeders; the
      // R32 leaves come out in the correct top-to-bottom visual order.
      const byId = {};
      KNOCKOUT_MATCHES.forEach(m => { byId[m.id] = m; });
      const leafOrder = [];
      const visit = (id) => {
        const m = byId[id];
        if (!m) return;
        if (m.feedHome && m.feedAway) {
          visit(m.feedHome);
          visit(m.feedAway);
        } else {
          leafOrder.push(id); // R32 leaf
        }
      };
      visit("F_1");
      const r32Rank = {};
      leafOrder.forEach((id, i) => { r32Rank[id] = i; });
      // A match's visual rank = average rank of the R32 leaves under it
      const matchRank = (id) => {
        const m = byId[id];
        if (!m) return 0;
        if (!m.feedHome || !m.feedAway) return r32Rank[id] ?? 0;
        return (matchRank(m.feedHome) + matchRank(m.feedAway)) / 2;
      };
      stages.forEach(st => {
        st.matches = [...st.matches].sort((a,b) => matchRank(a.id) - matchRank(b.id));
      });

      // Build group results. In actual mode, myPreds IS the real results object.
      const groupResults = {};
      GROUP_MATCHES.forEach(m => {
        const pred = myPreds[m.id];
        if (pred?.home_score != null) groupResults[m.id] = pred;
      });

      // Count how many groups are fully complete (for the actual-mode note)
      const completeGroups = Object.keys(WC_GROUPS).filter(g =>
        GROUP_MATCHES.filter(m => m.group === g).every(m => groupResults[m.id]?.home_score != null)
      ).length;

      // Refs to every match card so we can measure exact positions and draw
      // pixel-perfect SVG connectors regardless of text wrapping.
      const cardRefs = React.useRef({});
      const containerRef = React.useRef(null);
      const [lines, setLines] = React.useState([]);
      const [dims, setDims] = React.useState({ w: 0, h: 0 });

      React.useLayoutEffect(() => {
        const measure = () => {
          const cont = containerRef.current;
          if (!cont) return;
          const cb = cont.getBoundingClientRect();
          const newLines = [];
          // For each non-R32 match, draw from its two feeder cards into it
          KNOCKOUT_MATCHES.forEach(m => {
            if (!m.feedHome || !m.feedAway) return;
            const target = cardRefs.current[m.id];
            if (!target) return;
            const tb = target.getBoundingClientRect();
            const tx = tb.left - cb.left;             // left edge of target
            const ty = tb.top - cb.top + tb.height/2; // vertical center of target
            [m.feedHome, m.feedAway].forEach(feedId => {
              const src = cardRefs.current[feedId];
              if (!src) return;
              const sb = src.getBoundingClientRect();
              const sx = sb.right - cb.left;             // right edge of source
              const sy = sb.top - cb.top + sb.height/2;  // vertical center of source
              const midX = sx + (tx - sx) / 2;           // elbow midpoint
              newLines.push({ sx, sy, tx, ty, midX, key: `${feedId}-${m.id}` });
            });
          });
          setLines(newLines);
          setDims({ w: cont.scrollWidth, h: cont.scrollHeight });
        };
        measure();
        // Re-measure on resize
        window.addEventListener("resize", measure);
        const t = setTimeout(measure, 100); // after fonts settle
        return () => { window.removeEventListener("resize", measure); clearTimeout(t); };
      }, [myPreds, results, actualMode]);

      return (
        <div>
          <div style={{ fontFamily:"Barlow", fontSize:12, color:"#475569", marginBottom:12 }}>
            {actualMode
              ? `📡 Live bracket from real results · ${completeGroups}/12 groups complete${completeGroups<12?" (fills in as groups finish)":""}`
              : "Scroll → to see all rounds · Tap team to pick winner"}
          </div>
          <div style={{ overflowX:"auto", paddingBottom:12 }}>
            <div ref={containerRef} style={{ position:"relative", display:"flex", gap:28, minWidth: stages.length * 200 }}>
              {/* SVG connector layer */}
              <svg style={{ position:"absolute", top:0, left:0, width:dims.w, height:dims.h, pointerEvents:"none", zIndex:0 }}>
                {lines.map(l => (
                  <path key={l.key}
                    d={`M ${l.sx} ${l.sy} H ${l.midX} V ${l.ty} H ${l.tx}`}
                    fill="none" stroke="rgba(251,191,36,0.3)" strokeWidth="1.5" />
                ))}
              </svg>
              {stages.map((stage, stageIdx) => {
                // Spacing units to lay cards out in bracket shape
                const CARD = 62, GAP0 = 26, UNIT = CARD + GAP0;
                const factor = Math.pow(2, stageIdx);
                const firstTop = stageIdx === 0 ? 0 : (UNIT * (factor - 1)) / 2;
                const between = stageIdx === 0 ? GAP0 : (UNIT * factor - CARD);
                return (
                <div key={stage.key} style={{ flex:1, minWidth:172, display:"flex", flexDirection:"column", position:"relative", zIndex:1 }}>
                  <div style={{ fontFamily:"Bebas Neue", fontSize:12, color:"#fbbf24", letterSpacing:1, textAlign:"center", padding:"0 4px 8px", borderBottom:"1px solid rgba(251,191,36,0.15)", marginBottom:8 }}>
                    {stage.label}
                  </div>
                  <div style={{ display:"flex", flexDirection:"column", paddingTop: firstTop }}>
                    {stage.matches.map((m, matchIdx) => {
                      const teams = resolveKnockoutTeams(m.id, myPreds, groupResults, myPreds, actualMode);
                      const homeName = teams.home;
                      const awayName = teams.away;
                      const isTBD = homeName==="TBD" || awayName==="TBD";

                      const pred = myPreds[m.id];
                      const result = results[m.id];
                      const myWinner = pred ? (pred.home_score > pred.away_score ? "home" : "away") : null;
                      const actualWinner = result?.home_score != null ? (result.home_score > result.away_score ? "home" : "away") : null;
                      const correct = myWinner && actualWinner && myWinner === actualWinner;

                      return (
                        <div key={m.id}
                          ref={el => { cardRefs.current[m.id] = el; }}
                          style={{ marginBottom: matchIdx < stage.matches.length-1 ? between : 0, background:"rgba(15,23,42,0.85)", border:`1px solid ${correct?"rgba(74,222,128,0.3)":pred?"rgba(251,191,36,0.2)":"rgba(255,255,255,0.08)"}`, borderRadius:8, overflow:"hidden" }}>
                          {[{name:homeName,side:"home"},{name:awayName,side:"away"}].map(({name,side},idx) => {
                            const isMyPick = myWinner===side;
                            const isWinner = actualWinner===side;
                            const score = side==="home" ? result?.home_score : result?.away_score;
                            return (
                              <div key={side}
                                onClick={() => onPredict && !isTBD && onPredict(m.id, side)}
                                style={{
                                  padding:"7px 8px",
                                  cursor: onPredict && !isTBD ? "pointer" : "default",
                                  background: isMyPick ? (actualWinner ? (correct?"rgba(74,222,128,0.2)":"rgba(248,113,113,0.15)") : "rgba(251,191,36,0.15)") : "transparent",
                                  borderBottom: idx===0 ? "1px solid rgba(255,255,255,0.06)" : "none",
                                  display:"flex", justifyContent:"space-between", alignItems:"center",
                                  transition:"background 0.15s",
                                }}>
                                <span style={{ fontFamily:"Barlow", fontSize:11, fontWeight:600, color:isTBD||name.includes("1st")||name.includes("2nd")||name.includes("3rd")||name.includes("Winner")?"#475569":"#e2e8f0", flex:1, lineHeight:1.2 }}>{name}</span>
                                <div style={{ display:"flex", alignItems:"center", gap:4, flexShrink:0 }}>
                                  {score != null && <span style={{ fontFamily:"Bebas Neue", fontSize:13, color:isWinner?"#4ade80":"#64748b" }}>{score}</span>}
                                  {isMyPick && !actualWinner && <span style={{ fontSize:9, color:"#fbbf24" }}>●</span>}
                                  {isMyPick && correct && <span style={{ fontSize:9, color:"#4ade80" }}>✓</span>}
                                  {isMyPick && actualWinner && !correct && <span style={{ fontSize:9, color:"#f87171" }}>✗</span>}
                                </div>
                              </div>
                            );
                          })}
                          {m.date && (
                            <div style={{ padding:"4px 8px", background:"rgba(0,0,0,0.25)", borderTop:"1px solid rgba(255,255,255,0.06)", fontFamily:"Barlow", fontSize:8.5, color:"#64748b", display:"flex", justifyContent:"space-between", gap:4, lineHeight:1.2 }}>
                              <span>{m.date} · {m.time}</span>
                              <span style={{ color:"#475569" }}>📍{m.venue}</span>
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                </div>
                );
              })}
            </div>
          </div>
        </div>
      );
    }

    function MatchCard({ match, myPred, result, onPredict, stage, label, locked }) {
      const [hs, setHs] = useState(myPred?.home_score ?? "");
      const [as_, setAs] = useState(myPred?.away_score ?? "");
      const hasResult = result?.home_score != null;
      const hasPred = myPred?.home_score != null;

      const predCorrect = hasPred && hasResult && (() => {
        if (stage === "group") {
          const pw = myPred.home_score > myPred.away_score?"home":myPred.home_score<myPred.away_score?"away":"draw";
          const rw = result.home_score > result.away_score?"home":result.home_score<result.away_score?"away":"draw";
          return pw === rw;
        } else {
          const pw = myPred.home_score > myPred.away_score?"home":"away";
          const rw = result.home_score > result.away_score?"home":"away";
          return pw === rw;
        }
      })();
      const exactScore = hasPred && hasResult && myPred.home_score===result.home_score && myPred.away_score===result.away_score;

      const borderColor = hasResult ? (predCorrect ? "rgba(74,222,128,0.3)" : "rgba(248,113,113,0.2)") : hasPred ? "rgba(251,191,36,0.25)" : "rgba(255,255,255,0.06)";

      return (
        <div style={{ background:"rgba(255,255,255,0.03)", border:`1px solid ${borderColor}`, borderRadius:8, padding:"10px 12px", marginBottom:6 }}>
          {label && <div style={{ fontFamily:"Barlow", fontSize:10, color:"#475569", marginBottom:4 }}>{label}</div>}
          <div style={{ display:"flex", alignItems:"center", gap:6 }}>
            {/* Home team */}
            <div style={{ flex:1, fontFamily:"Barlow", fontSize:13, fontWeight:600, color:"#e2e8f0", textAlign:"right", lineHeight:1.2 }}>{match.home}</div>

            {/* Score area */}
            <div style={{ display:"flex", alignItems:"center", gap:4, flexShrink:0 }}>
              {hasResult ? (
                <>
                  <span style={{ fontFamily:"Bebas Neue", fontSize:20, color:predCorrect?"#4ade80":"#f87171", minWidth:18, textAlign:"center" }}>{result.home_score}</span>
                  <span style={{ fontFamily:"Bebas Neue", fontSize:14, color:"#475569" }}>-</span>
                  <span style={{ fontFamily:"Bebas Neue", fontSize:20, color:predCorrect?"#4ade80":"#f87171", minWidth:18, textAlign:"center" }}>{result.away_score}</span>
                </>
              ) : onPredict ? (
                <>
                  <input type="number" min="0" max="20" value={hs}
                    onChange={e=>{ const v=e.target.value; setHs(v); if(v!==""&&as_!=="") onPredict(match.id, Number(v), Number(as_)); }}
                    onBlur={() => hs!==""&&as_!==""&&onPredict(match.id, Number(hs), Number(as_))}
                    style={{ width:36, textAlign:"center", fontFamily:"Bebas Neue", fontSize:18, background:"rgba(255,255,255,0.08)", border:"1px solid rgba(251,191,36,0.4)", borderRadius:5, color:"#fbbf24", padding:"4px 2px", outline:"none", MozAppearance:"textfield" }} />
                  <span style={{ fontFamily:"Bebas Neue", fontSize:14, color:"#475569" }}>-</span>
                  <input type="number" min="0" max="20" value={as_}
                    onChange={e=>{ const v=e.target.value; setAs(v); if(hs!==""&&v!=="") onPredict(match.id, Number(hs), Number(v)); }}
                    onBlur={() => hs!==""&&as_!==""&&onPredict(match.id, Number(hs), Number(as_))}
                    style={{ width:36, textAlign:"center", fontFamily:"Bebas Neue", fontSize:18, background:"rgba(255,255,255,0.08)", border:"1px solid rgba(251,191,36,0.4)", borderRadius:5, color:"#fbbf24", padding:"4px 2px", outline:"none", MozAppearance:"textfield" }} />
                </>
              ) : (
                <>
                  <span style={{ fontFamily:"Bebas Neue", fontSize:18, color:hasPred?"#fbbf24":"#334155", minWidth:18, textAlign:"center" }}>{hasPred?myPred.home_score:"?"}</span>
                  <span style={{ fontFamily:"Bebas Neue", fontSize:14, color:"#334155" }}>-</span>
                  <span style={{ fontFamily:"Bebas Neue", fontSize:18, color:hasPred?"#fbbf24":"#334155", minWidth:18, textAlign:"center" }}>{hasPred?myPred.away_score:"?"}</span>
                </>
              )}
            </div>

            {/* Away team */}
            <div style={{ flex:1, fontFamily:"Barlow", fontSize:13, fontWeight:600, color:"#e2e8f0", lineHeight:1.2 }}>{match.away}</div>

            {/* Status indicator */}
            <div style={{ flexShrink:0, width:20, textAlign:"center" }}>
              {exactScore ? <span style={{ fontSize:12 }}>🎯</span>
               : predCorrect ? <span style={{ fontSize:12, color:"#4ade80" }}>✓</span>
               : hasResult && hasPred ? <span style={{ fontSize:12, color:"#f87171" }}>✗</span>
               : hasPred ? <span style={{ fontSize:10, color:"#fbbf24" }}>●</span>
               : locked ? <span style={{ fontSize:10 }}>🔒</span>
               : null}
            </div>
          </div>

          {/* My prediction shown below if result is in */}
          {hasPred && hasResult && (
            <div style={{ fontFamily:"Barlow", fontSize:10, color:"#475569", marginTop:4, textAlign:"center" }}>
              Your pick: <span style={{ color:"#fbbf24" }}>{myPred.home_score}–{myPred.away_score}</span>
              {predCorrect && <span style={{ color:"#4ade80", marginLeft:4 }}>+2pts</span>}
              {exactScore && <span style={{ color:"#fbbf24", marginLeft:4 }}>+1pt exact!</span>}
            </div>
          )}
        </div>
      );
    }

    function AdminMatchCard({ match, result, onSave, label, homeTeam, awayTeam, apiInFeed }) {
      const [hs, setHs] = useState(result?.home_score ?? "");
      const [as_, setAs] = useState(result?.away_score ?? "");
      const homeLabel = homeTeam && homeTeam !== "TBD" ? homeTeam : match.home;
      const awayLabel = awayTeam && awayTeam !== "TBD" ? awayTeam : match.away;
      const teamsKnown = homeTeam && awayTeam && homeTeam!=="TBD" && awayTeam!=="TBD";
      return (
        <div style={{ background:"rgba(255,255,255,0.03)", border:"1px solid rgba(248,113,113,0.15)", borderRadius:8, padding:"14px 16px", marginBottom:8 }}>

            {label && <div style={{ fontFamily:"Barlow", fontSize:11, color:"#475569" }}>{label}</div>}
            {apiInFeed !== undefined && teamsKnown && (
              <div style={{ fontFamily:"Barlow", fontSize:10, fontWeight:700, color: apiInFeed?"#4ade80":"#fbbf24", background: apiInFeed?"rgba(74,222,128,0.1)":"rgba(251,191,36,0.1)", border:`1px solid ${apiInFeed?"rgba(74,222,128,0.25)":"rgba(251,191,36,0.25)"}`, borderRadius:5, padding:"2px 7px", whiteSpace:"nowrap" }}>

            <input type="number" min="0" value={hs} onChange={e=>setHs(e.target.value)}
              style={{ width:48, textAlign:"center", fontFamily:"Bebas Neue", fontSize:22, background:"rgba(248,113,113,0.1)", border:"1px solid rgba(248,113,113,0.3)", borderRadius:6, color:"#f87171", padding:"5px", outline:"none" }} />
            <span style={{ fontFamily:"Bebas Neue", color:"#475569" }}>–</span>
            <input type="number" min="0" value={as_} onChange={e=>setAs(e.target.value)}
              style={{ width:48, textAlign:"center", fontFamily:"Bebas Neue", fontSize:22, background:"rgba(248,113,113,0.1)", border:"1px solid rgba(248,113,113,0.3)", borderRadius:6, color:"#f87171", padding:"5px", outline:"none" }} />
            <div style={{ flex:1, fontFamily:"Barlow", fontSize:14, fontWeight:600, color:"#e2e8f0", textAlign:"right" }}>{awayLabel}</div>
            <button onClick={() => hs!==""&&as_!==""&&onSave(match.id, Number(hs), Number(as_))}
              style={{ background:"rgba(248,113,113,0.15)", border:"1px solid #f87171", borderRadius:6, color:"#f87171", padding:"6px 12px", cursor:"pointer", fontFamily:"Bebas Neue", fontSize:14 }}>SAVE</button>
          </div>
          {result?.home_score!=null && <div style={{ fontFamily:"Barlow", fontSize:11, color:"#4ade80", marginTop:6 }}>✓ Result saved: {result.home_score}–{result.away_score}</div>}
        </div>
      );
    }

    function SummaryView({ games, gameStats, playerStats, players, team, rec, getGS }) {
      const [now, setNow] = useState(new Date());
      useEffect(() => {
        const interval = setInterval(() => setNow(new Date()), 60000);
        return () => clearInterval(interval);
      }, []);

      const parseGameDate = (g) => {
        try {
          const d = new Date(`${g.date} 2026 ${g.time}`);
          return isNaN(d) ? null : d;
        } catch { return null; }
      };

      const gamesWithDates = games.map(g => ({ ...g, parsedDate: parseGameDate(g) }))
        .filter(g => g.parsedDate)
        .sort((a,b) => a.parsedDate - b.parsedDate);

      const upcoming = gamesWithDates.filter(g => g.parsedDate > now);
      const past = gamesWithDates.filter(g => g.parsedDate <= now);
      const nextGame = upcoming[0];

      let countdown = null;
      if (nextGame) {
        const diff = nextGame.parsedDate - now;
        if (diff > 0) {
          countdown = {
            days: Math.floor(diff / (1000*60*60*24)),
            hours: Math.floor((diff % (1000*60*60*24)) / (1000*60*60)),
            mins: Math.floor((diff % (1000*60*60)) / (1000*60)),
          };
        }
      }

      const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      const tomorrow = new Date(today); tomorrow.setDate(tomorrow.getDate() + 1);
      const reminders = gamesWithDates.filter(g => {
        const gd = new Date(g.parsedDate.getFullYear(), g.parsedDate.getMonth(), g.parsedDate.getDate());
        return gd.getTime() === tomorrow.getTime();
      });

      const recentPast = [...past].reverse().slice(0, 3);
      const opp2 = (g) => g.home === team.name ? g.away : g.home;
      const isHome2 = (g) => g.home === team.name;

      const makeIcs = (g) => {
        try {
          const start = new Date(`${g.date} 2026 ${g.time}`);
          const end = new Date(start.getTime() + 90*60*1000);
          const fmt = (d) => d.toISOString().replace(/-|:|\.\d+/g,"").slice(0,15)+"Z";
          const ics = ["BEGIN:VCALENDAR","VERSION:2.0","BEGIN:VEVENT",
            `DTSTART:${fmt(start)}`,`DTEND:${fmt(end)}`,
            `SUMMARY:${team.name} vs ${opp2(g)}`,
            `LOCATION:Field ${g.field}`,
            `DESCRIPTION:${isHome2(g)?"Home":"Away"} game vs ${opp2(g)}`,
            "BEGIN:VALARM","TRIGGER:-P1D","ACTION:DISPLAY","DESCRIPTION:Game tomorrow!","END:VALARM",
            "END:VEVENT","END:VCALENDAR"].join("\r\n");
          const blob = new Blob([ics],{type:"text/calendar;charset=utf-8"});
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href=url; a.download="game.ics"; a.click();
          URL.revokeObjectURL(url);
        } catch(e) { alert("Couldn't create event."); }
      };

      return (
        <div>
          {/* Reminder banner */}
          {reminders.length > 0 && (
            <div style={{ background:"rgba(251,191,36,0.12)", border:"1px solid rgba(251,191,36,0.4)", borderRadius:10, padding:"14px 18px", marginBottom:20 }}>
              <div style={{ fontFamily:"Bebas Neue", fontSize:20, color:"#fbbf24", letterSpacing:2, marginBottom:6 }}>🔔 GAME TOMORROW!</div>
              {reminders.map(g => (
                <div key={g.id} style={{ fontFamily:"Barlow", fontSize:14, color:"#e2e8f0" }}>
                  vs <strong>{opp2(g)}</strong> · {isHome2(g)?"Home":"Away"} · {g.time} · Field {g.field}
                </div>
              ))}
            </div>
          )}

          {/* Next game countdown */}
          {nextGame && countdown && (
            <div style={{ background:"rgba(77,184,255,0.07)", border:"1px solid rgba(77,184,255,0.2)", borderRadius:10, padding:"20px", marginBottom:20 }}>
              <div className="section-title" style={{ marginBottom:8 }}>Next Game</div>
              <div style={{ fontFamily:"Barlow", fontSize:16, fontWeight:600, color:"#7dd3fc", marginBottom:4 }}>
                vs {opp2(nextGame)} · {isHome2(nextGame)?"Home":"Away"}
              </div>
              <div style={{ fontFamily:"Barlow", fontSize:13, color:"#64748b", marginBottom:16 }}>
                {nextGame.date} · {nextGame.time} · Field {nextGame.field}
              </div>
              <div style={{ display:"flex", gap:10, marginBottom:16 }}>
                {[{val:countdown.days,label:"DAYS"},{val:countdown.hours,label:"HRS"},{val:countdown.mins,label:"MIN"}].map(({val,label}) => (
                  <div key={label} style={{ flex:1, background:"rgba(0,0,0,0.2)", borderRadius:8, padding:"14px 8px", textAlign:"center", border:"1px solid rgba(77,184,255,0.15)" }}>
                    <div style={{ fontFamily:"Bebas Neue", fontSize:40, color:"#4db8ff", lineHeight:1 }}>{val}</div>
                    <div style={{ fontFamily:"Barlow", fontSize:11, color:"#475569", letterSpacing:2, marginTop:4 }}>{label}</div>
                  </div>
                ))}
              </div>
              <button onClick={() => makeIcs(nextGame)} style={{ width:"100%", background:"rgba(77,184,255,0.15)", border:"1px solid #4db8ff", borderRadius:8, color:"#4db8ff", padding:"12px", cursor:"pointer", fontFamily:"Bebas Neue", fontSize:18, letterSpacing:2 }}>
                📅 ADD TO CALENDAR
              </button>
            </div>
          )}

          {/* Top Players */}
          {players.length > 0 && (
            <div style={{ marginBottom:20 }}>
              <div className="section-title">Top Players</div>
              <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:8 }}>
                {[
                  { label:"⚽ Top Scorer", key:"goals", color:"#4db8ff" },
                  { label:"🎯 Top Assist", key:"assists", color:"#34d399" },
                  { label:"⭐ Most MVP", key:"mvps", color:"#fbbf24" },
                ].map(({ label, key, color }) => {
                  const stats = players.map(p => {
                    let goals=0, assists=0, mvps=0;
                    Object.entries(playerStats || {}).forEach(([gid, gps]) => {
                      const ps = gps[p.id];
                      if (ps) { goals+=ps.goals||0; assists+=ps.assists||0; }
                    });
                    Object.values(gameStats || {}).forEach(gs => { if(gs.mvp===p.id) mvps++; });
                    return { ...p, goals, assists, mvps };
                  });
                  const top = stats.sort((a,b) => b[key]-a[key])[0];
                  const val = top?.[key] || 0;
                  return (
                    <div key={key} style={{ background:"rgba(255,255,255,0.03)", border:`1px solid ${color}33`, borderRadius:10, padding:"14px 10px", textAlign:"center" }}>
                      <div style={{ fontFamily:"Barlow", fontSize:10, color:"#475569", letterSpacing:1, marginBottom:8 }}>{label}</div>
                      <div style={{ fontFamily:"Bebas Neue", fontSize:28, color, lineHeight:1, marginBottom:4 }}>{val}</div>
                      <div style={{ fontFamily:"Barlow", fontSize:12, fontWeight:600, color:"#e2e8f0", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
                        {val > 0 ? (top?.number ? `#${top.number} ` : "") + top?.name : "—"}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* Season record */}
          <div style={{ background:"rgba(255,255,255,0.03)", border:"1px solid rgba(255,255,255,0.06)", borderRadius:10, padding:"16px 20px", marginBottom:20 }}>
            <div className="section-title" style={{ marginBottom:12 }}>Season Record</div>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:8, textAlign:"center" }}>
              {[{val:rec.wins,label:"WINS",color:"#4ade80"},{val:rec.losses,label:"LOSSES",color:"#f87171"},{val:rec.draws,label:"DRAWS",color:"#facc15"},{val:rec.cleanSheets,label:"CLEAN SH.",color:"#4db8ff"}].map(({val,label,color}) => (
                <div key={label} style={{ background:"rgba(0,0,0,0.15)", borderRadius:8, padding:"12px 6px", border:`1px solid ${color}22` }}>
                  <div style={{ fontFamily:"Bebas Neue", fontSize:34, color, lineHeight:1 }}>{val}</div>
                  <div style={{ fontFamily:"Barlow", fontSize:10, color:"#475569", letterSpacing:1, marginTop:4 }}>{label}</div>
                </div>
              ))}
            </div>
          </div>

          {/* Recent results */}
          {recentPast.length > 0 && (
            <div style={{ marginBottom:20 }}>
              <div className="section-title">Recent Results</div>
              {recentPast.map(g => {
                const gs = getGS(g.id);
                const played = gs.score_us !== "" && gs.score_them !== "";
                const us = Number(gs.score_us), them = Number(gs.score_them);
                const result = played ? (us>them?"W":us<them?"L":"D") : null;
                const mvpPlayer = gs.mvp ? players.find(p=>p.id===gs.mvp) : null;
                return (
                  <div key={g.id} style={{ background:"rgba(255,255,255,0.03)", border:"1px solid rgba(255,255,255,0.06)", borderRadius:8, padding:"14px 16px", marginBottom:8, display:"flex", alignItems:"center", justifyContent:"space-between" }}>
                    <div>
                      <div style={{ fontFamily:"Barlow", fontSize:11, color:"#475569", marginBottom:3 }}>{g.date} · {isHome2(g)?"HOME":"AWAY"}</div>
                      <div style={{ fontFamily:"Barlow", fontSize:15, fontWeight:600, color:"#e2e8f0" }}>vs {opp2(g)}</div>
                      {mvpPlayer && <div style={{ fontFamily:"Barlow", fontSize:11, color:"#fbbf24", marginTop:2 }}>⭐ {mvpPlayer.name}</div>}
                    </div>
                    <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                      {played && <div style={{ fontFamily:"Bebas Neue", fontSize:28, color:"#fff" }}>{gs.score_us}–{gs.score_them}</div>}
                      {result && (
                        <div style={{ width:32, height:32, borderRadius:6, display:"flex", alignItems:"center", justifyContent:"center", fontFamily:"Bebas Neue", fontSize:18,
                          background:result==="W"?"rgba(74,222,128,0.15)":result==="L"?"rgba(248,113,113,0.15)":"rgba(250,204,21,0.15)",
                          color:result==="W"?"#4ade80":result==="L"?"#f87171":"#facc15" }}>{result}</div>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          {/* Upcoming games */}
          {upcoming.length > 0 && (
            <div>
              <div className="section-title">Upcoming Games</div>
              {upcoming.slice(0,5).map(g => (
                <div key={g.id} style={{ background:"rgba(255,255,255,0.03)", border:"1px solid rgba(255,255,255,0.06)", borderRadius:8, padding:"12px 16px", marginBottom:8 }}>
                  <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between" }}>
                    <div>
                      <div style={{ fontFamily:"Barlow", fontSize:11, color:"#475569", marginBottom:2 }}>{g.date} · {isHome2(g)?"HOME":"AWAY"} · Field {g.field}</div>
                      <div style={{ fontFamily:"Barlow", fontSize:15, fontWeight:600, color:"#e2e8f0" }}>vs {opp2(g)}</div>
                    </div>
                    <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                      <div style={{ fontFamily:"Bebas Neue", fontSize:16, color:"#4db8ff" }}>{g.time}</div>
                      <button onClick={() => makeIcs(g)} style={{ background:"rgba(77,184,255,0.1)", border:"1px solid rgba(77,184,255,0.3)", borderRadius:6, color:"#4db8ff", padding:"5px 8px", cursor:"pointer", fontFamily:"Barlow", fontSize:12 }}>📅</button>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    function GameDetail({ game, teamName, opponent, gs, players, getPS, onUpdateGS, onBack, onUpdatePS, isEditor }) {
      const [saving, setSaving] = useState({});

      const handleGS = async (fields) => {
        await onUpdateGS(fields);
      };

      const handlePS = async (playerId, field, value) => {
        const key = `${playerId}-${field}`;
        setSaving(prev => ({ ...prev, [key]: true }));
        await onUpdatePS(playerId, { [field]: value });
        setSaving(prev => ({ ...prev, [key]: false }));
      };

      return (
        <div>
          <button onClick={onBack} style={{ background:"none", border:"none", color:"#4db8ff", cursor:"pointer", fontFamily:"Barlow", fontSize:14, marginBottom:20, display:"flex", alignItems:"center", gap:6 }}>
            ← Back to Schedule
          </button>
          <div style={{ background:"rgba(77,184,255,0.07)", border:"1px solid rgba(77,184,255,0.2)", borderRadius:10, padding:"20px", marginBottom:24 }}>
            <div style={{ fontFamily:"Barlow", fontSize:12, color:"#64748b", letterSpacing:2, marginBottom:6 }}>
              {game.day.toUpperCase()} {game.date} · {game.time} · Field {game.field}
            </div>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", flexWrap:"wrap", gap:16 }}>
              <div style={{ fontFamily:"Bebas Neue", fontSize:26, color:"#4db8ff" }}>
                {teamName.toUpperCase()} <span style={{ color:"#475569", fontSize:18 }}>vs</span> {opponent.toUpperCase()}
              </div>
              <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                {isEditor ? (
                  <>
                    <input className="score-input" type="number" min="0" placeholder="0"
                      defaultValue={gs.score_us}
                      onBlur={e => handleGS({ score_us: e.target.value })} />
                    <span style={{ fontFamily:"Bebas Neue", fontSize:28, color:"#475569" }}>–</span>
                    <input className="score-input" type="number" min="0" placeholder="0"
                      defaultValue={gs.score_them}
                      onBlur={e => handleGS({ score_them: e.target.value })} />
                  </>
