                  <div style={{ fontFamily:"Bebas Neue", fontSize:36, color:"#fff" }}>
                    {gs.score_us||"–"} <span style={{ color:"#475569" }}>:</span> {gs.score_them||"–"}
                  </div>
                )}
              </div>
            </div>
            {isEditor && (
            <div style={{ display:"flex", gap:20, marginTop:16, flexWrap:"wrap", alignItems:"center" }}>
              <label style={{ display:"flex", alignItems:"center", gap:8, cursor:"pointer", fontFamily:"Barlow", fontSize:14 }}>
                <input type="checkbox" defaultChecked={gs.clean_sheet}
                  onChange={e => handleGS({ clean_sheet: e.target.checked })}
                  style={{ width:16, height:16, accentColor:"#4db8ff" }} />
                <span style={{ color:"#94a3b8" }}>🧤 Team Clean Sheet</span>
              </label>
              <div style={{ display:"flex", alignItems:"center", gap:8, flex:1, minWidth:200 }}>
                <span style={{ fontFamily:"Barlow", fontSize:14, color:"#fbbf24", whiteSpace:"nowrap" }}>⭐ MVP</span>
                <select className="mvp-select" defaultValue={gs.mvp}
                  onChange={e => handleGS({ mvp: e.target.value })}>
                  <option value="">— Select MVP —</option>
                  {players.map(p => <option key={p.id} value={p.id}>{p.number?`#${p.number} `:""}{p.name}</option>)}
                </select>
              </div>
            </div>
            )}
            {!isEditor && gs.mvp && (
              <div style={{ marginTop:12, fontFamily:"Barlow", fontSize:14, color:"#fbbf24" }}>
                ⭐ MVP: {players.find(p=>p.id===gs.mvp)?.name || ""}
                {gs.clean_sheet && <span style={{ marginLeft:16, color:"#4db8ff" }}>🧤 Clean Sheet</span>}
              </div>
            )}
          </div>

          <div className="section-title">Player Stats</div>
          {players.map(player => {
            const ps = getPS(game.id, player.id);
            const isMvp = gs.mvp === player.id;
            return (
              <div key={player.id} style={{
                borderRadius:8, marginBottom:8, overflow:"hidden",
                background:isMvp?"rgba(251,191,36,0.08)":"rgba(255,255,255,0.03)",
                border:`1px solid ${isMvp?"rgba(251,191,36,0.3)":"rgba(255,255,255,0.06)"}`,
              }}>
                {/* Player name row */}
                <div style={{ display:"flex", alignItems:"center", gap:8, padding:"10px 14px", borderBottom:"1px solid rgba(255,255,255,0.05)" }}>
                  {player.number && <span style={{ fontFamily:"Bebas Neue", fontSize:16, color:"#4db8ff", flexShrink:0 }}>#{player.number}</span>}
                  <span style={{ fontFamily:"Barlow", fontSize:15, fontWeight:600, color:isMvp?"#fbbf24":"#e2e8f0", flex:1 }}>{isMvp?"⭐ ":""}{player.name}</span>
                  {/* Appeared toggle */}
                  {isEditor ? (
                    <button onClick={() => handlePS(player.id, "appeared", !ps.appeared)}
                      style={{ background:ps.appeared?"rgba(74,222,128,0.15)":"rgba(255,255,255,0.04)", border:`1px solid ${ps.appeared?"#4ade80":"rgba(255,255,255,0.1)"}`, borderRadius:6, color:ps.appeared?"#4ade80":"#475569", padding:"4px 10px", cursor:"pointer", fontFamily:"Barlow", fontSize:11, fontWeight:600, flexShrink:0 }}>
                      {ps.appeared?"✓ PLAYED":"PLAYED?"}
                    </button>
                  ) : ps.appeared ? (
                    <span style={{ fontFamily:"Barlow", fontSize:11, color:"#4ade80" }}>✓</span>
                  ) : null}
                  {/* Clean sheet toggle */}
                  {isEditor ? (
                    <button onClick={() => handlePS(player.id, "clean_sheet", !ps.clean_sheet)}
                      style={{ background:ps.clean_sheet?"rgba(77,184,255,0.2)":"rgba(255,255,255,0.04)", border:`1px solid ${ps.clean_sheet?"#4db8ff":"rgba(255,255,255,0.1)"}`, borderRadius:6, color:ps.clean_sheet?"#4db8ff":"#475569", padding:"4px 10px", cursor:"pointer", fontFamily:"Barlow", fontSize:11, fontWeight:600, flexShrink:0 }}>
                      🧤 {ps.clean_sheet?"✓":"—"}
                    </button>
                  ) : ps.clean_sheet ? (
                    <span style={{ fontFamily:"Barlow", fontSize:12, color:"#4db8ff" }}>🧤</span>
                  ) : null}
                </div>
                {/* Stats row */}
                <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", padding:"10px 8px", gap:4 }}>
                  {[
                    {field:"goals", color:"#4db8ff", label:"⚽ GOALS", val:ps.goals},
                    {field:"assists", color:"#34d399", label:"🎯 ASST", val:ps.assists},
                    {field:"yellow_cards", color:"#fbbf24", label:"🟨 YEL", val:ps.yellow_cards},
                    {field:"red_cards", color:"#f87171", label:"🟥 RED", val:ps.red_cards},
                  ].map(({field,color,label,val}) => (
                    <div key={field} style={{ textAlign:"center" }}>
                      <div style={{ fontFamily:"Barlow", fontSize:10, color:"#475569", marginBottom:4 }}>{label}</div>
                      {isEditor ? (
                        <div style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:4 }}>
                          <button onClick={() => handlePS(player.id, field, Math.max(0,(val||0)-1))}
                            style={{ width:32, height:32, borderRadius:"50%", border:`1px solid ${color}44`, background:`${color}18`, color, cursor:"pointer", fontSize:18, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>−</button>
                          <span style={{ fontFamily:"Bebas Neue", fontSize:24, color:(val||0)>0?color:"#334155", minWidth:24, textAlign:"center" }}>{val||0}</span>
                          <button onClick={() => handlePS(player.id, field, (val||0)+1)}
                            style={{ width:32, height:32, borderRadius:"50%", border:`1px solid ${color}44`, background:`${color}18`, color, cursor:"pointer", fontSize:18, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>+</button>
                        </div>
                      ) : (
                        <div style={{ fontFamily:"Bebas Neue", fontSize:24, color:(val||0)>0?color:"#334155" }}>{val||0}</div>
                      )}
                    </div>
                  ))}
                </div>
              </div>
            );
          })}
        </div>
      );
    }

    function RosterView({ players, onAdd, onUpdate, onDelete, isEditor }) {
      const [editingId, setEditingId] = useState(null);
      const [editName, setEditName] = useState("");
      const [editNumber, setEditNumber] = useState("");
      const [newName, setNewName] = useState("");
      const [newNumber, setNewNumber] = useState("");
      const [saving, setSaving] = useState(false);

      const handleAdd = async () => {
        if (!newName.trim()) return;
        setSaving(true);
        await onAdd(newName.trim(), newNumber);
        setNewName(""); setNewNumber("");
        setSaving(false);
      };

      const handleSave = async (id) => {
        await onUpdate(id, editName, editNumber);
        setEditingId(null);
      };

      return (
        <div>
          <div className="section-title">{isEditor ? "Manage Roster" : "Roster"}</div>
          <div style={{ display:"grid", gridTemplateColumns:"52px 1fr auto", gap:10, padding:"4px 14px", marginBottom:6 }}>
            <div style={{ fontFamily:"Barlow", fontSize:11, color:"#475569", textAlign:"center" }}>#</div>
            <div style={{ fontFamily:"Barlow", fontSize:11, color:"#475569" }}>NAME</div>
          </div>
          {players.map(p => (
            <div key={p.id} style={{ display:"flex", alignItems:"center", gap:10, marginBottom:8, background:"rgba(255,255,255,0.03)", padding:"10px 14px", borderRadius:6, border:"1px solid rgba(255,255,255,0.06)" }}>
              {isEditor && editingId===p.id ? (
                <>
                  <input type="number" value={editNumber} onChange={e=>setEditNumber(e.target.value)} placeholder="#" className="shirt-input" min="1" max="99" />
                  <input type="text" value={editName} onChange={e=>setEditName(e.target.value)}
                    onKeyDown={e=>{ if(e.key==="Enter") handleSave(p.id); }} autoFocus style={{ flex:1 }} />
                  <button onClick={()=>handleSave(p.id)} className="btn btn-primary" style={{ padding:"5px 12px", fontSize:13 }}>Save</button>
                  <button onClick={()=>setEditingId(null)} style={{ background:"none", border:"1px solid #334155", borderRadius:5, color:"#64748b", padding:"5px 10px", cursor:"pointer", fontFamily:"Barlow" }}>✕</button>
                </>
              ) : (
                <>
                  <div style={{ width:36, height:36, borderRadius:6, background:"rgba(77,184,255,0.1)", border:"1px solid rgba(77,184,255,0.2)", display:"flex", alignItems:"center", justifyContent:"center", fontFamily:"Bebas Neue", fontSize:18, color:"#4db8ff", flexShrink:0 }}>
                    {p.number || "—"}
                  </div>
                  <span style={{ flex:1, fontFamily:"Barlow", fontSize:15, color:"#cbd5e1" }}>{p.name}</span>
                  {isEditor && <>
                    <button onClick={()=>{ setEditingId(p.id); setEditName(p.name); setEditNumber(p.number||""); }}
                      style={{ background:"none", border:"1px solid rgba(77,184,255,0.3)", borderRadius:5, color:"#4db8ff", padding:"5px 12px", cursor:"pointer", fontFamily:"Barlow", fontSize:13 }}>Edit</button>
                    <button onClick={()=>onDelete(p.id)}
                      style={{ background:"none", border:"1px solid rgba(248,113,113,0.3)", borderRadius:5, color:"#f87171", padding:"5px 10px", cursor:"pointer", fontFamily:"Barlow", fontSize:13 }}>✕</button>
                  </>}
                </>
              )}
            </div>
          ))}
          {isEditor && (
            <div style={{ display:"flex", gap:10, marginTop:16 }}>
              <input type="number" placeholder="#" value={newNumber} onChange={e=>setNewNumber(e.target.value)} className="shirt-input" min="1" max="99" />
              <input type="text" placeholder="Player name..." value={newName} onChange={e=>setNewName(e.target.value)}
                onKeyDown={e=>{ if(e.key==="Enter") handleAdd(); }} style={{ flex:1 }} />
              <button onClick={handleAdd} disabled={saving} className="btn btn-primary" style={{ fontFamily:"Bebas Neue", fontSize:18, letterSpacing:1 }}>
                {saving ? <div className="spinner" /> : "+ ADD"}
              </button>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
