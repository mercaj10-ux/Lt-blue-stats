      const [adding, setAdding] = useState(false);
      const [isEditor, setIsEditor] = useState(() => sessionStorage.getItem("isEditor") === "true");
      const [showPin, setShowPin] = useState(false);

      const loadTeams = useCallback(async () => {
        setLoading(true);
        const { data } = await sb.from("teams").select("*").order("created_at");
        setTeams(data || []);
        setLoading(false);
      }, []);

      useEffect(() => { loadTeams(); }, [loadTeams]);

      const unlockEditor = () => {
        setIsEditor(true);
        sessionStorage.setItem("isEditor", "true");
        setShowPin(false);
      };

      const lockEditor = () => {
        setIsEditor(false);
        sessionStorage.removeItem("isEditor");
      };

      const addTeam = async () => {
        if (!newTeamName.trim() || !isEditor) return;
        setAdding(true);
        const { data, error } = await sb.from("teams").insert({ name: newTeamName.trim() }).select().single();
        if (!error && data) {
          const games = TEAM_GAMES[newTeamName.trim()];

            await sb.from("games").insert(games.map(g => ({ ...g, team_id: data.id })));

          setNewTeamName("");
          await loadTeams();
        }
        setAdding(false);

        if (!confirm("Delete this team and all its data?")) return;
        await sb.from("teams").delete().eq("id", id);
        await loadTeams();

    function TeamApp({ team, onBack, isEditor }) {
      const [view, setView] = useState("schedule");
      const [activeGame, setActiveGame] = useState(null);
      const [games, setGames] = useState([]);
      const [players, setPlayers] = useState([]);
      const [gameStats, setGameStats] = useState({});
      const [playerStats, setPlayerStats] = useState({});
      const [loading, setLoading] = useState(true);

      const loadAll = useCallback(async () => {
        setLoading(true);
        const [gRes, pRes, gsRes, psRes] = await Promise.all([
          sb.from("games").select("*").eq("team_id", team.id).order("id"),
          sb.from("players").select("*").eq("team_id", team.id).order("created_at"),
          sb.from("game_stats").select("*").eq("team_id", team.id),
          sb.from("player_stats").select("*").eq("team_id", team.id),
        ]);
        setGames(gRes.data || []);
        setPlayers(pRes.data || []);
        const gs = {};
        (gsRes.data || []).forEach(s => { gs[s.game_id] = s; });
        setGameStats(gs);
        const ps = {};
        (psRes.data || []).forEach(s => {
          if (!ps[s.game_id]) ps[s.game_id] = {};
          ps[s.game_id][s.player_id] = s;
        });
        setPlayerStats(ps);
        setLoading(false);
      }, [team.id]);

      useEffect(() => { loadAll(); }, [loadAll]);

      const upsertGameStat = async (gameId, fields) => {
        const existing = gameStats[gameId];
        if (existing) {
          await sb.from("game_stats").update(fields).eq("id", existing.id);
        } else {
          await sb.from("game_stats").insert({ game_id: gameId, team_id: team.id, ...fields });
        }
        const { data } = await sb.from("game_stats").select("*").eq("game_id", gameId).eq("team_id", team.id).single();
        setGameStats(prev => ({ ...prev, [gameId]: data }));
      };

      const upsertPlayerStat = async (gameId, playerId, fields) => {
        const existing = playerStats[gameId]?.[playerId];
        if (existing) {
          await sb.from("player_stats").update(fields).eq("id", existing.id);
        } else {
          await sb.from("player_stats").insert({ game_id: gameId, player_id: playerId, team_id: team.id, ...fields });
        }
        const { data } = await sb.from("player_stats").select("*").eq("game_id", gameId).eq("player_id", playerId).single();
        setPlayerStats(prev => ({ ...prev, [gameId]: { ...(prev[gameId]||{}), [playerId]: data } }));
      };

      const addPlayer = async (name, number) => {
        const { data } = await sb.from("players").insert({ team_id: team.id, name, number }).select().single();
        if (data) setPlayers(prev => [...prev, data]);
      };

      const updatePlayer = async (id, name, number) => {
        await sb.from("players").update({ name, number }).eq("id", id);
        setPlayers(prev => prev.map(p => p.id===id ? {...p, name, number} : p));
      };

      const deletePlayer = async (id) => {
        await sb.from("players").delete().eq("id", id);
        setPlayers(prev => prev.filter(p => p.id !== id));
      };

      const getGS = (gameId) => gameStats[gameId] || { score_us:"", score_them:"", clean_sheet:false, mvp:"" };
      const getPS = (gameId, playerId) => playerStats[gameId]?.[playerId] || { goals:0, assists:0, yellow_cards:0, red_cards:0, clean_sheet:false };

      const totals = players.map(p => {
        let goals=0, assists=0, yellowCards=0, redCards=0, mvps=0, cleanSheets=0, appearances=0;
        Object.entries(playerStats).forEach(([gid, gps]) => {
          const ps = gps[p.id];
          if (ps) { goals+=ps.goals||0; assists+=ps.assists||0; yellowCards+=ps.yellow_cards||0; redCards+=ps.red_cards||0; if(ps.clean_sheet) cleanSheets++; appearances++; }
        });
        Object.values(gameStats).forEach(gs => { if(gs.mvp===p.id) mvps++; });
        return { ...p, goals, assists, yellowCards, redCards, mvps, cleanSheets, appearances };
      }).sort((a,b) => (b.goals+b.assists)-(a.goals+a.assists));

      const rec = {
        wins:   Object.values(gameStats).filter(g=>g.score_us!==""&&g.score_them!==""&&Number(g.score_us)>Number(g.score_them)).length,
        losses: Object.values(gameStats).filter(g=>g.score_us!==""&&g.score_them!==""&&Number(g.score_us)<Number(g.score_them)).length,
        draws:  Object.values(gameStats).filter(g=>g.score_us!==""&&g.score_them!==""&&Number(g.score_us)===Number(g.score_them)).length,
        cleanSheets: Object.values(gameStats).filter(g=>g.clean_sheet).length,
        goals: totals.reduce((s,p)=>s+p.goals,0),
      };

      const activeObj = games.find(g => g.id === activeGame);
      const activeGS = activeGame ? getGS(activeGame) : null;
      const opp = activeObj ? (activeObj.home===team.name ? activeObj.away : activeObj.home) : "";
      const navTo = (v) => { setView(v); setActiveGame(null); };

      if (loading) return (
        <div style={{ minHeight:"100vh", background:"linear-gradient(135deg,#0a1628 0%,#0d2347 50%,#0a1628 100%)", display:"flex", alignItems:"center", justifyContent:"center" }}>
          <Loading />
        </div>
      );

      return (
        <div style={{ minHeight:"100vh", background:"linear-gradient(135deg,#0a1628 0%,#0d2347 50%,#0a1628 100%)", fontFamily:"'Bebas Neue','Impact',sans-serif", color:"#e8f4fd" }}>

          {/* HEADER */}
          <div style={{ background:"rgba(77,184,255,0.05)", borderBottom:"1px solid rgba(77,184,255,0.2)", padding:"0 20px" }}>
            <div style={{ maxWidth:720, margin:"0 auto" }}>
              <div style={{ padding:"16px 0 6px", display:"flex", alignItems:"center", gap:12 }}>
                <button onClick={onBack} style={{ background:"none", border:"none", color:"#4db8ff", cursor:"pointer", fontFamily:"Barlow", fontSize:13, padding:0 }}>← ALL TEAMS</button>
              </div>
              <div style={{ display:"flex", alignItems:"baseline", gap:12 }}>
                <div style={{ fontSize:34, letterSpacing:4, color:"#fff", lineHeight:1 }}>{team.name.toUpperCase()}</div>
                <div style={{ fontSize:13, fontFamily:"Barlow", color:"#4db8ff", fontWeight:300, letterSpacing:2 }}>2026</div>
              </div>
              <div style={{ display:"flex", gap:20, padding:"8px 0 10px", fontFamily:"Barlow", fontSize:13, flexWrap:"wrap" }}>
                <span style={{ color:"#4ade80" }}>{rec.wins}W</span>
                <span style={{ color:"#f87171" }}>{rec.losses}L</span>
                <span style={{ color:"#facc15" }}>{rec.draws}D</span>
                <span style={{ color:"#94a3b8" }}>⚽ {rec.goals} goals</span>
                <span style={{ color:"#94a3b8" }}>🧤 {rec.cleanSheets} clean sheets</span>
              </div>
              <div style={{ display:"flex" }}>
                {["schedule","roster","leaderboard"].map(v => (
                  <button key={v} className="nav-btn" onClick={() => navTo(v)}
                    style={{ color:view===v&&!activeGame?"#4db8ff":"#64748b", borderBottom:view===v&&!activeGame?"2px solid #4db8ff":"2px solid transparent" }}>
                    {v}
                  </button>
                ))}
              </div>
            </div>
          </div>

          <div style={{ maxWidth:720, margin:"0 auto", padding:"24px 20px" }}>

            {/* SCHEDULE */}
            {view==="schedule" && !activeGame && (
              <div>
                <div className="section-title">Season Games{isEditor?" — Tap to Enter Stats":""}</div>
                {games.length === 0 && (
                  <div style={{ fontFamily:"Barlow", color:"#475569", fontSize:14 }}>No games scheduled yet.</div>
                )}
                {games.map(g => {
                  const gs = getGS(g.id);
                  const played = gs.score_us!==""&&gs.score_them!=="";
                  const us=Number(gs.score_us), them=Number(gs.score_them);
                  const result = played?(us>them?"W":us<them?"L":"D"):null;
                  const opponent = g.home===team.name?g.away:g.home;
                  const isHome = g.home===team.name;
                  const mvpPlayer = gs.mvp ? players.find(p=>p.id===gs.mvp) : null;
                  return (
                    <div key={g.id} className={`game-card${played?" played":""}`} onClick={() => { setActiveGame(g.id); setView("game"); }}>
                      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                        <div style={{ display:"flex", gap:14, alignItems:"center" }}>
                          <div style={{ textAlign:"center", minWidth:44 }}>
                            <div style={{ fontFamily:"Barlow", fontSize:11, color:"#64748b", letterSpacing:1 }}>{g.day.toUpperCase()}</div>
                            <div style={{ fontFamily:"Bebas Neue", fontSize:20, lineHeight:1.1 }}>{g.date}</div>
                            <div style={{ fontFamily:"Barlow", fontSize:11, color:"#94a3b8" }}>{g.time}</div>
                          </div>
                          <div>
                            <div style={{ fontFamily:"Barlow", fontSize:11, color:"#64748b", marginBottom:2 }}>{isHome?"HOME":"AWAY"} · Field {g.field}</div>
                            <div style={{ fontFamily:"Barlow", fontSize:16, fontWeight:600, color:"#e2e8f0" }}>vs <span style={{ color:"#7dd3fc" }}>{opponent}</span></div>
                            {mvpPlayer && <div style={{ fontFamily:"Barlow", fontSize:11, color:"#fbbf24" }}>⭐ MVP: {mvpPlayer.name}</div>}
                          </div>
                        </div>
                        <div style={{ display:"flex", alignItems:"center", gap:12 }}>
                          {played && <div style={{ fontFamily:"Bebas Neue", fontSize:32, color:"#fff", lineHeight:1 }}>{gs.score_us}–{gs.score_them}</div>}
                          {result && (
                            <div style={{ width:34, height:34, borderRadius:6, display:"flex", alignItems:"center", justifyContent:"center", fontFamily:"Bebas Neue", fontSize:20,
                              background:result==="W"?"rgba(74,222,128,0.15)":result==="L"?"rgba(248,113,113,0.15)":"rgba(250,204,21,0.15)",
                              color:result==="W"?"#4ade80":result==="L"?"#f87171":"#facc15" }}>{result}</div>
                          )}
                          {!played && isEditor && <div style={{ fontFamily:"Barlow", fontSize:12, color:"#334155" }}>+ ADD STATS</div>}
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}

            {/* GAME DETAIL */}
            {view==="game" && activeGame && activeObj && (
              <GameDetail
                game={activeObj} teamName={team.name} opponent={opp}
                gs={activeGS} players={players}
                getPS={getPS} isEditor={isEditor}
                onUpdateGS={(fields) => upsertGameStat(activeGame, fields)}
                onUpdatePS={(playerId, fields) => upsertPlayerStat(activeGame, playerId, fields)}
                onBack={() => { setView("schedule"); setActiveGame(null); }}
              />
            )}

            {/* ROSTER */}
            {view==="roster" && (
              <RosterView players={players} isEditor={isEditor} onAdd={addPlayer} onUpdate={updatePlayer} onDelete={deletePlayer} />
            )}

            {/* LEADERBOARD */}
            {view==="leaderboard" && (
              <div>
                <div className="section-title">Season Leaderboard</div>
                {totals.map((t,i) => (
                  <div key={t.id} style={{
                    borderRadius:8, marginBottom:8, overflow:"hidden",
                    background:i===0&&(t.goals+t.assists)>0?"rgba(251,191,36,0.07)":"rgba(255,255,255,0.03)",
                    border:`1px solid ${i===0&&(t.goals+t.assists)>0?"rgba(251,191,36,0.25)":"rgba(255,255,255,0.06)"}`,
                  }}>
                    {/* Player name row */}
                    <div style={{ display:"flex", alignItems:"center", gap:10, padding:"10px 14px", borderBottom:"1px solid rgba(255,255,255,0.05)" }}>
                      <div style={{ fontFamily:"Bebas Neue", fontSize:18, color:i<3?["#fbbf24","#94a3b8","#b45309"][i]:"#334155", minWidth:20, textAlign:"center" }}>{i+1}</div>
                      {t.number && <span style={{ fontFamily:"Bebas Neue", fontSize:16, color:"#4db8ff" }}>#{t.number}</span>}
                      <span style={{ fontFamily:"Barlow", fontSize:15, fontWeight:600, color:"#e2e8f0", flex:1 }}>{t.name}</span>
                      <span style={{ fontFamily:"Barlow", fontSize:11, color:"#475569" }}>{t.appearances} APP</span>
                    </div>
                    {/* Stats row */}
                    <div style={{ display:"grid", gridTemplateColumns:"repeat(6,1fr)", padding:"8px 6px" }}>
                      {[
                        { label:"⚽", val:t.goals, color:"#4db8ff" },
                        { label:"🎯", val:t.assists, color:"#34d399" },
                        { label:"🟨", val:t.yellowCards, color:"#fbbf24" },
                        { label:"🟥", val:t.redCards, color:"#f87171" },
                        { label:"🧤", val:t.cleanSheets, color:"#4db8ff" },
                        { label:"⭐", val:t.mvps, color:"#fbbf24" },
                      ].map(({label,val,color}) => (
                        <div key={label} style={{ textAlign:"center" }}>
                          <div style={{ fontFamily:"Bebas Neue", fontSize:22, color:val>0?color:"#334155", lineHeight:1 }}>{val}</div>
                          <div style={{ fontFamily:"Barlow", fontSize:10, color:"#475569", marginTop:2 }}>{label}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      );
    }

    function GameDetail({ game, teamName, opponent, gs, players, getPS, onUpdateGS, onBack, onUpdatePS, isEditor }) {
      const [saving, setSaving] = useState({});

      const handleGS = async (fields) => {
        await onUpdateGS(fields);
      };

      const handlePS = async (playerId, field, value) => {
        const key = `${playerId}-${field}`;
        setSaving(prev => ({ ...prev, [key]: true }));
        await onUpdatePS(playerId, { [field]: value });
        setSaving(prev => ({ ...prev, [key]: false }));
      };

      return (
        <div>
          <button onClick={onBack} style={{ background:"none", border:"none", color:"#4db8ff", cursor:"pointer", fontFamily:"Barlow", fontSize:14, marginBottom:20, display:"flex", alignItems:"center", gap:6 }}>
            ← Back to Schedule
          </button>
          <div style={{ background:"rgba(77,184,255,0.07)", border:"1px solid rgba(77,184,255,0.2)", borderRadius:10, padding:"20px", marginBottom:24 }}>
            <div style={{ fontFamily:"Barlow", fontSize:12, color:"#64748b", letterSpacing:2, marginBottom:6 }}>
              {game.day.toUpperCase()} {game.date} · {game.time} · Field {game.field}
            </div>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", flexWrap:"wrap", gap:16 }}>
              <div style={{ fontFamily:"Bebas Neue", fontSize:26, color:"#4db8ff" }}>
                {teamName.toUpperCase()} <span style={{ color:"#475569", fontSize:18 }}>vs</span> {opponent.toUpperCase()}
              </div>
              <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                {isEditor ? (
                  <>
                    <input className="score-input" type="number" min="0" placeholder="0"
                      defaultValue={gs.score_us}
                      onBlur={e => handleGS({ score_us: e.target.value })} />
                    <span style={{ fontFamily:"Bebas Neue", fontSize:28, color:"#475569" }}>–</span>
                    <input className="score-input" type="number" min="0" placeholder="0"
                      defaultValue={gs.score_them}
                      onBlur={e => handleGS({ score_them: e.target.value })} />
                  </>
                ) : (
                  <div style={{ fontFamily:"Bebas Neue", fontSize:36, color:"#fff" }}>
                    {gs.score_us||"–"} <span style={{ color:"#475569" }}>:</span> {gs.score_them||"–"}
                  </div>
                )}
              </div>
            </div>
            {isEditor && (
            <div style={{ display:"flex", gap:20, marginTop:16, flexWrap:"wrap", alignItems:"center" }}>
              <label style={{ display:"flex", alignItems:"center", gap:8, cursor:"pointer", fontFamily:"Barlow", fontSize:14 }}>
                <input type="checkbox" defaultChecked={gs.clean_sheet}
                  onChange={e => handleGS({ clean_sheet: e.target.checked })}
                  style={{ width:16, height:16, accentColor:"#4db8ff" }} />
                <span style={{ color:"#94a3b8" }}>🧤 Team Clean Sheet</span>
              </label>
              <div style={{ display:"flex", alignItems:"center", gap:8, flex:1, minWidth:200 }}>
                <span style={{ fontFamily:"Barlow", fontSize:14, color:"#fbbf24", whiteSpace:"nowrap" }}>⭐ MVP</span>
                <select className="mvp-select" defaultValue={gs.mvp}
                  onChange={e => handleGS({ mvp: e.target.value })}>
                  <option value="">— Select MVP —</option>
                  {players.map(p => <option key={p.id} value={p.id}>{p.number?`#${p.number} `:""}{p.name}</option>)}
                </select>
              </div>
            </div>
            )}
            {!isEditor && gs.mvp && (
              <div style={{ marginTop:12, fontFamily:"Barlow", fontSize:14, color:"#fbbf24" }}>
                ⭐ MVP: {players.find(p=>p.id===gs.mvp)?.name || ""}
                {gs.clean_sheet && <span style={{ marginLeft:16, color:"#4db8ff" }}>🧤 Clean Sheet</span>}
              </div>
            )}
          </div>

          <div className="section-title">Player Stats</div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 76px 76px 66px 66px 60px", gap:6, padding:"6px 10px", marginBottom:6 }}>
            {["PLAYER","⚽ GOALS","🎯 ASST","🟨 YEL","🟥 RED","🧤"].map(h => (
              <div key={h} style={{ fontFamily:"Barlow", fontSize:10, color:"#475569", textAlign:"center" }}>{h}</div>
            ))}
          </div>
          {players.map(player => {
            const ps = getPS(game.id, player.id);
            const isMvp = gs.mvp === player.id;
            return (
              <div key={player.id} style={{
                display:"grid", gridTemplateColumns:"1fr 76px 76px 66px 66px 60px", gap:6, alignItems:"center",
                padding:"8px 10px", borderRadius:6, marginBottom:5,
                background:isMvp?"rgba(251,191,36,0.08)":"rgba(255,255,255,0.03)",
                border:`1px solid ${isMvp?"rgba(251,191,36,0.3)":"rgba(255,255,255,0.05)"}`,
              }}>
                <div style={{ fontFamily:"Barlow", fontSize:13, fontWeight:500, color:isMvp?"#fbbf24":"#cbd5e1", display:"flex", alignItems:"center", gap:5, overflow:"hidden" }}>
                  {player.number && <span style={{ fontFamily:"Bebas Neue", fontSize:15, color:"#4db8ff", flexShrink:0 }}>#{player.number}</span>}
                  <span style={{ overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{isMvp?"⭐ ":""}{player.name}</span>
                </div>
                {[{field:"goals",color:"#4db8ff",val:ps.goals},{field:"assists",color:"#34d399",val:ps.assists},{field:"yellow_cards",color:"#fbbf24",val:ps.yellow_cards},{field:"red_cards",color:"#f87171",val:ps.red_cards}].map(({field,color,val}) => (
                  <div key={field} style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:2 }}>
                    {isEditor ? (
                      <>
                        <button className="stat-btn" style={{ borderColor:color, color, background:`${color}18`, width:26, height:26, fontSize:15 }}
                          onClick={() => handlePS(player.id, field, Math.max(0,(val||0)-1))}>−</button>
                        <span style={{ minWidth:22, textAlign:"center", fontFamily:"Bebas Neue", fontSize:20, color:(val||0)>0?color:"#334155" }}>{val||0}</span>
                        <button className="stat-btn" style={{ borderColor:color, color, background:`${color}18`, width:26, height:26, fontSize:15 }}
                          onClick={() => handlePS(player.id, field, (val||0)+1)}>+</button>
                      </>
                    ) : (
                      <span style={{ minWidth:22, textAlign:"center", fontFamily:"Bebas Neue", fontSize:20, color:(val||0)>0?color:"#334155" }}>{val||0}</span>
                    )}
                  </div>
                ))}
                <div style={{ display:"flex", alignItems:"center", justifyContent:"center" }}>
                  <button onClick={() => handlePS(player.id, "clean_sheet", !ps.clean_sheet)}
                    style={{ background:ps.clean_sheet?"rgba(77,184,255,0.2)":"rgba(255,255,255,0.04)", border:`1px solid ${ps.clean_sheet?"#4db8ff":"rgba(255,255,255,0.1)"}`, borderRadius:6, color:ps.clean_sheet?"#4db8ff":"#334155", padding:"4px 8px", cursor:"pointer", fontFamily:"Barlow", fontSize:13, fontWeight:600 }}>
                    {ps.clean_sheet?"✓":"—"}
                  </button>
                </div>
              </div>
            );
          })}
        </div>
      );
    }

    function RosterView({ players, onAdd, onUpdate, onDelete, isEditor }) {
      const [editingId, setEditingId] = useState(null);
      const [editName, setEditName] = useState("");
      const [editNumber, setEditNumber] = useState("");
      const [newName, setNewName] = useState("");
      const [newNumber, setNewNumber] = useState("");
      const [saving, setSaving] = useState(false);

      const handleAdd = async () => {
        if (!newName.trim()) return;
        setSaving(true);
        await onAdd(newName.trim(), newNumber);
        setNewName(""); setNewNumber("");
        setSaving(false);
      };

      const handleSave = async (id) => {
        await onUpdate(id, editName, editNumber);
        setEditingId(null);
      };

      return (
        <div>
          <div className="section-title">{isEditor ? "Manage Roster" : "Roster"}</div>
          <div style={{ display:"grid", gridTemplateColumns:"52px 1fr auto", gap:10, padding:"4px 14px", marginBottom:6 }}>
            <div style={{ fontFamily:"Barlow", fontSize:11, color:"#475569", textAlign:"center" }}>#</div>
            <div style={{ fontFamily:"Barlow", fontSize:11, color:"#475569" }}>NAME</div>
          </div>
          {players.map(p => (
            <div key={p.id} style={{ display:"flex", alignItems:"center", gap:10, marginBottom:8, background:"rgba(255,255,255,0.03)", padding:"10px 14px", borderRadius:6, border:"1px solid rgba(255,255,255,0.06)" }}>
              {isEditor && editingId===p.id ? (
                <>
                  <input type="number" value={editNumber} onChange={e=>setEditNumber(e.target.value)} placeholder="#" className="shirt-input" min="1" max="99" />
                  <input type="text" value={editName} onChange={e=>setEditName(e.target.value)}
                    onKeyDown={e=>{ if(e.key==="Enter") handleSave(p.id); }} autoFocus style={{ flex:1 }} />
                  <button onClick={()=>handleSave(p.id)} className="btn btn-primary" style={{ padding:"5px 12px", fontSize:13 }}>Save</button>
                  <button onClick={()=>setEditingId(null)} style={{ background:"none", border:"1px solid #334155", borderRadius:5, color:"#64748b", padding:"5px 10px", cursor:"pointer", fontFamily:"Barlow" }}>✕</button>
                </>
              ) : (
                <>
                  <div style={{ width:36, height:36, borderRadius:6, background:"rgba(77,184,255,0.1)", border:"1px solid rgba(77,184,255,0.2)", display:"flex", alignItems:"center", justifyContent:"center", fontFamily:"Bebas Neue", fontSize:18, color:"#4db8ff", flexShrink:0 }}>
                    {p.number || "—"}
                  </div>
                  <span style={{ flex:1, fontFamily:"Barlow", fontSize:15, color:"#cbd5e1" }}>{p.name}</span>
                  {isEditor && <>
                    <button onClick={()=>{ setEditingId(p.id); setEditName(p.name); setEditNumber(p.number||""); }}
                      style={{ background:"none", border:"1px solid rgba(77,184,255,0.3)", borderRadius:5, color:"#4db8ff", padding:"5px 12px", cursor:"pointer", fontFamily:"Barlow", fontSize:13 }}>Edit</button>
                    <button onClick={()=>onDelete(p.id)}
                      style={{ background:"none", border:"1px solid rgba(248,113,113,0.3)", borderRadius:5, color:"#f87171", padding:"5px 10px", cursor:"pointer", fontFamily:"Barlow", fontSize:13 }}>✕</button>
                  </>}
                </>
              )}
            </div>
          ))}
          {isEditor && (
            <div style={{ display:"flex", gap:10, marginTop:16 }}>
              <input type="number" placeholder="#" value={newNumber} onChange={e=>setNewNumber(e.target.value)} className="shirt-input" min="1" max="99" />
              <input type="text" placeholder="Player name..." value={newName} onChange={e=>setNewName(e.target.value)}
                onKeyDown={e=>{ if(e.key==="Enter") handleAdd(); }} style={{ flex:1 }} />
              <button onClick={handleAdd} disabled={saving} className="btn btn-primary" style={{ fontFamily:"Bebas Neue", fontSize:18, letterSpacing:1 }}>
                {saving ? <div className="spinner" /> : "+ ADD"}
              </button>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
