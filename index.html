<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a1628" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Lt Blue Stats" />
  <title>Lt Blue Stat Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a1628; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #0a1628; }
    ::-webkit-scrollbar-thumb { background: #4db8ff; border-radius: 2px; }
    .nav-btn { background: none; border: none; cursor: pointer; font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 2px; padding: 10px 20px; transition: all 0.2s; }
    .nav-btn:hover { transform: translateY(-1px); }
    .game-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(77,184,255,0.15); border-radius: 8px; padding: 14px 18px; cursor: pointer; transition: all 0.2s; margin-bottom: 8px; }
    .game-card:hover { background: rgba(77,184,255,0.1); border-color: rgba(77,184,255,0.4); transform: translateX(4px); }
    .game-card.played { border-left: 3px solid #4db8ff; }
    .stat-btn { width: 32px; height: 32px; border-radius: 50%; border: 1px solid rgba(77,184,255,0.4); background: rgba(77,184,255,0.1); color: #4db8ff; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
    .stat-btn:hover { background: rgba(77,184,255,0.3); }
    .leaderboard-row { display: grid; grid-template-columns: 24px 1fr 50px 50px 50px 50px 50px; gap: 10px; align-items: center; padding: 10px 14px; border-radius: 6px; margin-bottom: 5px; }
    .score-input { background: rgba(255,255,255,0.08); border: 1px solid rgba(77,184,255,0.3); border-radius: 6px; color: #fff; font-family: 'Bebas Neue'; font-size: 28px; width: 60px; text-align: center; padding: 6px; outline: none; -moz-appearance: textfield; }
    .score-input:focus { border-color: #4db8ff; background: rgba(77,184,255,0.1); }
    .score-input::-webkit-inner-spin-button, .score-input::-webkit-outer-spin-button { -webkit-appearance: none; }
    .mvp-select { background: #0d2347; border: 1px solid rgba(77,184,255,0.3); border-radius: 6px; color: #fff; font-family: 'Barlow', sans-serif; padding: 8px 12px; width: 100%; outline: none; cursor: pointer; }
    .section-title { font-size: 13px; font-family: 'Barlow'; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: #4db8ff; margin-bottom: 12px; opacity: 0.8; }
    input[type=text], input[type=number] { background: rgba(255,255,255,0.08); border: 1px solid rgba(77,184,255,0.3); border-radius: 6px; color: #fff; font-family: 'Barlow'; padding: 8px 12px; outline: none; }
    input[type=text]:focus, input[type=number]:focus { border-color: #4db8ff; }
    select option { background: #0d2347; color: #fff; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    const GAMES = [
      { id: 1, date: "May 27", day: "Wed", time: "5:45 PM", home: "Lt Blue", away: "Green", field: "11" },
      { id: 2, date: "Jun 1",  day: "Mon", time: "7:15 PM", home: "Lt Blue", away: "Maroon", field: "11" },
      { id: 3, date: "Jun 8",  day: "Mon", time: "5:45 PM", home: "Lt Blue", away: "Tie Dye", field: "10" },
      { id: 4, date: "Jun 10", day: "Wed", time: "7:15 PM", home: "Lt Blue", away: "White", field: "10" },
      { id: 5, date: "Jun 22", day: "Mon", time: "5:45 PM", home: "Red",     away: "Lt Blue", field: "10" },
      { id: 6, date: "Jun 29", day: "Mon", time: "7:15 PM", home: "Gold",    away: "Lt Blue", field: "10" },
      { id: 7, date: "Jul 6",  day: "Mon", time: "7:15 PM", home: "Lt Blue", away: "Dk Blue", field: "11" },
      { id: 8, date: "Jul 29", day: "Wed", time: "6:00 PM", home: "Black",   away: "Lt Blue", field: "CP10" },
      { id: 9, date: "Aug 10", day: "Mon", time: "6:00 PM", home: "Lt Blue", away: "White", field: "10" },
      { id: 10, date: "Aug 17", day: "Mon", time: "6:00 PM", home: "Tie Dye", away: "Lt Blue", field: "11" },
    ];

    const DEFAULT_PLAYERS = [
      "Player 1","Player 2","Player 3","Player 4","Player 5","Player 6",
      "Player 7","Player 8","Player 9","Player 10","Player 11","Player 12",
    ];

    const emptyGame = () => ({ score: { us: "", them: "" }, playerStats: {}, mvp: "", cleanSheet: false });
    const emptyPlayer = () => ({ goals: 0, assists: 0, yellowCards: 0, redCards: 0 });

    function App() {
      const [players, setPlayers] = useState(() => {
        try { return JSON.parse(localStorage.getItem("ltblue_players")) || DEFAULT_PLAYERS; } catch { return DEFAULT_PLAYERS; }
      });
      const [gameStats, setGameStats] = useState(() => {
        try { return JSON.parse(localStorage.getItem("ltblue_gameStats")) || {}; } catch { return {}; }
      });
      const [activeGame, setActiveGame] = useState(null);
      const [editingPlayer, setEditingPlayer] = useState(null);
      const [newPlayerName, setNewPlayerName] = useState("");
      const [view, setView] = useState("schedule");

      useEffect(() => { localStorage.setItem("ltblue_players", JSON.stringify(players)); }, [players]);
      useEffect(() => { localStorage.setItem("ltblue_gameStats", JSON.stringify(gameStats)); }, [gameStats]);

      const getGame = (id) => gameStats[id] || emptyGame();
      const updateGame = (id, data) => setGameStats(prev => ({ ...prev, [id]: { ...(prev[id] || emptyGame()), ...data } }));
      const getPS = (id, p) => (getGame(id).playerStats[p] || emptyPlayer());
      const updatePS = (id, p, field, val) => {
        const g = getGame(id);
        updateGame(id, { playerStats: { ...g.playerStats, [p]: { ...(g.playerStats[p] || emptyPlayer()), [field]: val } } });
      };

      const totals = players.map(p => {
        let goals=0,assists=0,yellowCards=0,redCards=0,mvps=0;
        Object.values(gameStats).forEach(g => {
          const ps = g.playerStats?.[p];
          if (ps) { goals+=ps.goals||0; assists+=ps.assists||0; yellowCards+=ps.yellowCards||0; redCards+=ps.redCards||0; }
          if (g.mvp === p) mvps++;
        });
        return { player: p, goals, assists, yellowCards, redCards, mvps };
      }).sort((a,b) => (b.goals+b.assists)-(a.goals+a.assists));

      const rec = {
        wins:   Object.values(gameStats).filter(g=>g.score.us!==""&&g.score.them!==""&&Number(g.score.us)>Number(g.score.them)).length,
        losses: Object.values(gameStats).filter(g=>g.score.us!==""&&g.score.them!==""&&Number(g.score.us)<Number(g.score.them)).length,
        draws:  Object.values(gameStats).filter(g=>g.score.us!==""&&g.score.them!==""&&Number(g.score.us)===Number(g.score.them)).length,
        cleanSheets: Object.values(gameStats).filter(g=>g.cleanSheet).length,
        goals: totals.reduce((s,p)=>s+p.goals,0),
      };

      const activeObj = GAMES.find(g => g.id === activeGame);
      const activeData = activeGame ? getGame(activeGame) : null;
      const opp = activeObj ? (activeObj.home==="Lt Blue" ? activeObj.away : activeObj.home) : "";

      const navTo = (v) => { setView(v); setActiveGame(null); };

      return (
        <div style={{ minHeight:"100vh", background:"linear-gradient(135deg,#0a1628 0%,#0d2347 50%,#0a1628 100%)", fontFamily:"'Bebas Neue','Impact',sans-serif", color:"#e8f4fd" }}>

          {/* HEADER */}
          <div style={{ background:"rgba(77,184,255,0.05)", borderBottom:"1px solid rgba(77,184,255,0.2)", padding:"0 20px" }}>
            <div style={{ maxWidth:720, margin:"0 auto" }}>
              <div style={{ padding:"20px 0 8px", display:"flex", alignItems:"baseline", gap:12 }}>
                <div style={{ fontSize:38, letterSpacing:4, color:"#fff", lineHeight:1 }}>LT BLUE</div>
                <div style={{ fontSize:14, fontFamily:"Barlow", color:"#4db8ff", fontWeight:300, letterSpacing:2 }}>STAT TRACKER · 2026</div>
              </div>
              <div style={{ display:"flex", gap:24, paddingBottom:12, fontFamily:"Barlow", fontSize:13 }}>
                <span style={{ color:"#4ade80" }}>{rec.wins}W</span>
                <span style={{ color:"#f87171" }}>{rec.losses}L</span>
                <span style={{ color:"#facc15" }}>{rec.draws}D</span>
                <span style={{ color:"#94a3b8" }}>⚽ {rec.goals} goals</span>
                <span style={{ color:"#94a3b8" }}>🧤 {rec.cleanSheets} clean sheets</span>
              </div>
              <div style={{ display:"flex" }}>
                {["schedule","roster","leaderboard"].map(v => (
                  <button key={v} className="nav-btn" onClick={() => navTo(v)}
                    style={{ color: view===v&&!activeGame?"#4db8ff":"#64748b", borderBottom: view===v&&!activeGame?"2px solid #4db8ff":"2px solid transparent" }}>
                    {v}
                  </button>
                ))}
              </div>
            </div>
          </div>

          <div style={{ maxWidth:720, margin:"0 auto", padding:"24px 20px" }}>

            {/* SCHEDULE */}
            {view==="schedule" && !activeGame && (
              <div>
                <div className="section-title">Season Games — Tap to Enter Stats</div>
                {GAMES.map(g => {
                  const data = getGame(g.id);
                  const played = data.score.us!==""&&data.score.them!=="";
                  const us=Number(data.score.us), them=Number(data.score.them);
                  const result = played ? (us>them?"W":us<them?"L":"D") : null;
                  const opponent = g.home==="Lt Blue"?g.away:g.home;
                  const isHome = g.home==="Lt Blue";
                  return (
                    <div key={g.id} className={`game-card${played?" played":""}`} onClick={() => { setActiveGame(g.id); setView("game"); }}>
                      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                        <div style={{ display:"flex", gap:14, alignItems:"center" }}>
                          <div style={{ textAlign:"center", minWidth:44 }}>
                            <div style={{ fontFamily:"Barlow", fontSize:11, color:"#64748b", letterSpacing:1 }}>{g.day.toUpperCase()}</div>
                            <div style={{ fontFamily:"Bebas Neue", fontSize:20, lineHeight:1.1 }}>{g.date}</div>
                            <div style={{ fontFamily:"Barlow", fontSize:11, color:"#94a3b8" }}>{g.time}</div>
                          </div>
                          <div>
                            <div style={{ fontFamily:"Barlow", fontSize:11, color:"#64748b", marginBottom:2 }}>{isHome?"HOME":"AWAY"} · Field {g.field}</div>
                            <div style={{ fontFamily:"Barlow", fontSize:16, fontWeight:600, color:"#e2e8f0" }}>vs <span style={{ color:"#7dd3fc" }}>{opponent}</span></div>
                            {data.mvp && <div style={{ fontFamily:"Barlow", fontSize:11, color:"#fbbf24" }}>⭐ MVP: {data.mvp}</div>}
                          </div>
                        </div>
                        <div style={{ display:"flex", alignItems:"center", gap:12 }}>
                          {played && <div style={{ fontFamily:"Bebas Neue", fontSize:32, color:"#fff", lineHeight:1 }}>{data.score.us}–{data.score.them}</div>}
                          {result && (
                            <div style={{ width:34, height:34, borderRadius:6, display:"flex", alignItems:"center", justifyContent:"center", fontFamily:"Bebas Neue", fontSize:20,
                              background: result==="W"?"rgba(74,222,128,0.15)":result==="L"?"rgba(248,113,113,0.15)":"rgba(250,204,21,0.15)",
                              color: result==="W"?"#4ade80":result==="L"?"#f87171":"#facc15" }}>{result}</div>
                          )}
                          {!played && <div style={{ fontFamily:"Barlow", fontSize:12, color:"#334155" }}>+ ADD STATS</div>}
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}

            {/* GAME DETAIL */}
            {view==="game" && activeGame && activeObj && (
              <div>
                <button onClick={() => { setView("schedule"); setActiveGame(null); }}
                  style={{ background:"none", border:"none", color:"#4db8ff", cursor:"pointer", fontFamily:"Barlow", fontSize:14, marginBottom:20, display:"flex", alignItems:"center", gap:6 }}>
                  ← Back to Schedule
                </button>
                <div style={{ background:"rgba(77,184,255,0.07)", border:"1px solid rgba(77,184,255,0.2)", borderRadius:10, padding:"20px", marginBottom:24 }}>
                  <div style={{ fontFamily:"Barlow", fontSize:12, color:"#64748b", letterSpacing:2, marginBottom:6 }}>
                    {activeObj.day.toUpperCase()} {activeObj.date} · {activeObj.time} · Field {activeObj.field}
                  </div>
                  <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", flexWrap:"wrap", gap:16 }}>
                    <div style={{ fontFamily:"Bebas Neue", fontSize:28, color:"#4db8ff" }}>
                      LT BLUE <span style={{ color:"#475569", fontSize:18 }}>vs</span> {opp.toUpperCase()}
                    </div>
                    <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                      <input className="score-input" type="number" min="0" placeholder="0"
                        value={activeData.score.us} onChange={e => updateGame(activeGame, { score:{...activeData.score, us:e.target.value} })} />
                      <span style={{ fontFamily:"Bebas Neue", fontSize:28, color:"#475569" }}>–</span>
                      <input className="score-input" type="number" min="0" placeholder="0"
                        value={activeData.score.them} onChange={e => updateGame(activeGame, { score:{...activeData.score, them:e.target.value} })} />
                    </div>
                  </div>
                  <div style={{ display:"flex", gap:20, marginTop:16, flexWrap:"wrap", alignItems:"center" }}>
                    <label style={{ display:"flex", alignItems:"center", gap:8, cursor:"pointer", fontFamily:"Barlow", fontSize:14 }}>
                      <input type="checkbox" checked={activeData.cleanSheet}
                        onChange={e => updateGame(activeGame, { cleanSheet:e.target.checked })}
                        style={{ width:16, height:16, accentColor:"#4db8ff" }} />
                      <span style={{ color:"#94a3b8" }}>🧤 Clean Sheet</span>
                    </label>
                    <div style={{ display:"flex", alignItems:"center", gap:8, flex:1, minWidth:200 }}>
                      <span style={{ fontFamily:"Barlow", fontSize:14, color:"#fbbf24", whiteSpace:"nowrap" }}>⭐ MVP</span>
                      <select className="mvp-select" value={activeData.mvp} onChange={e => updateGame(activeGame, { mvp:e.target.value })}>
                        <option value="">— Select MVP —</option>
                        {players.map(p => <option key={p} value={p}>{p}</option>)}
                      </select>
                    </div>
                  </div>
                </div>

                <div className="section-title">Player Stats</div>
                <div style={{ display:"grid", gridTemplateColumns:"1fr 80px 80px 70px 70px", gap:8, padding:"6px 14px", marginBottom:6 }}>
                  {["PLAYER","⚽ GOALS","🎯 ASST","🟨 YEL","🟥 RED"].map(h => (
                    <div key={h} style={{ fontFamily:"Barlow", fontSize:11, color:"#475569", textAlign:"center", letterSpacing:1 }}>{h}</div>
                  ))}
                </div>
                {players.map(player => {
                  const ps = getPS(activeGame, player);
                  const isMvp = activeData.mvp===player;
                  return (
                    <div key={player} style={{
                      display:"grid", gridTemplateColumns:"1fr 80px 80px 70px 70px", gap:8, alignItems:"center",
                      padding:"8px 14px", borderRadius:6, marginBottom:5,
                      background: isMvp?"rgba(251,191,36,0.08)":"rgba(255,255,255,0.03)",
                      border: `1px solid ${isMvp?"rgba(251,191,36,0.3)":"rgba(255,255,255,0.05)"}`,
                    }}>
                      <div style={{ fontFamily:"Barlow", fontSize:14, fontWeight:500, color:isMvp?"#fbbf24":"#cbd5e1" }}>
                        {isMvp&&"⭐ "}{player}
                      </div>
                      {[{field:"goals",color:"#4db8ff"},{field:"assists",color:"#34d399"},{field:"yellowCards",color:"#fbbf24"},{field:"redCards",color:"#f87171"}].map(({field,color}) => (
                        <div key={field} style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:4 }}>
                          <button className="stat-btn" style={{ borderColor:color, color, background:`${color}18` }}
                            onClick={() => updatePS(activeGame, player, field, Math.max(0,(ps[field]||0)-1))}>−</button>
                          <span style={{ minWidth:24, textAlign:"center", fontFamily:"Bebas Neue", fontSize:20, color:ps[field]>0?color:"#334155" }}>
                            {ps[field]||0}
                          </span>
                          <button className="stat-btn" style={{ borderColor:color, color, background:`${color}18` }}
                            onClick={() => updatePS(activeGame, player, field, (ps[field]||0)+1)}>+</button>
                        </div>
                      ))}
                    </div>
                  );
                })}
              </div>
            )}

            {/* ROSTER */}
            {view==="roster" && (
              <div>
                <div className="section-title">Manage Roster</div>
                {players.map((p,i) => (
                  <div key={i} style={{ display:"flex", alignItems:"center", gap:10, marginBottom:8, background:"rgba(255,255,255,0.03)", padding:"10px 14px", borderRadius:6, border:"1px solid rgba(255,255,255,0.06)" }}>
                    {editingPlayer===i ? (
                      <>
                        <input type="text" value={newPlayerName} onChange={e=>setNewPlayerName(e.target.value)}
                          onKeyDown={e=>{ if(e.key==="Enter"){ const np=[...players]; np[i]=newPlayerName||p; setPlayers(np); setEditingPlayer(null); }}}
                          autoFocus style={{ flex:1 }} />
                        <button onClick={()=>{ const np=[...players]; np[i]=newPlayerName||p; setPlayers(np); setEditingPlayer(null); }}
                          style={{ background:"rgba(77,184,255,0.2)", border:"1px solid #4db8ff", borderRadius:5, color:"#4db8ff", padding:"6px 14px", cursor:"pointer", fontFamily:"Barlow" }}>Save</button>
                        <button onClick={()=>setEditingPlayer(null)}
                          style={{ background:"none", border:"1px solid #334155", borderRadius:5, color:"#64748b", padding:"6px 14px", cursor:"pointer", fontFamily:"Barlow" }}>Cancel</button>
                      </>
                    ) : (
                      <>
                        <span style={{ flex:1, fontFamily:"Barlow", fontSize:15, color:"#cbd5e1" }}>{p}</span>
                        <button onClick={()=>{ setEditingPlayer(i); setNewPlayerName(p); }}
                          style={{ background:"none", border:"1px solid rgba(77,184,255,0.3)", borderRadius:5, color:"#4db8ff", padding:"5px 12px", cursor:"pointer", fontFamily:"Barlow", fontSize:13 }}>Edit</button>
                        <button onClick={()=>setPlayers(players.filter((_,j)=>j!==i))}
                          style={{ background:"none", border:"1px solid rgba(248,113,113,0.3)", borderRadius:5, color:"#f87171", padding:"5px 12px", cursor:"pointer", fontFamily:"Barlow", fontSize:13 }}>Remove</button>
                      </>
                    )}
                  </div>
                ))}
                <div style={{ display:"flex", gap:10, marginTop:16 }}>
                  <input type="text" placeholder="Add new player..." value={editingPlayer===null?newPlayerName:""}
                    onChange={e=>{ if(editingPlayer===null) setNewPlayerName(e.target.value); }}
                    onKeyDown={e=>{ if(e.key==="Enter"&&newPlayerName.trim()&&editingPlayer===null){ setPlayers([...players,newPlayerName.trim()]); setNewPlayerName(""); }}}
                    style={{ flex:1 }} />
                  <button onClick={()=>{ if(newPlayerName.trim()&&editingPlayer===null){ setPlayers([...players,newPlayerName.trim()]); setNewPlayerName(""); }}}
                    style={{ background:"rgba(77,184,255,0.15)", border:"1px solid #4db8ff", borderRadius:6, color:"#4db8ff", padding:"8px 20px", cursor:"pointer", fontFamily:"Bebas Neue", fontSize:18, letterSpacing:1 }}>
                    + ADD
                  </button>
                </div>
              </div>
            )}

            {/* LEADERBOARD */}
            {view==="leaderboard" && (
              <div>
                <div className="section-title">Season Leaderboard</div>
                <div style={{ display:"grid", gridTemplateColumns:"24px 1fr 50px 50px 50px 50px 50px", gap:10, padding:"6px 14px", marginBottom:8 }}>
                  {["#","PLAYER","⚽","🎯","🟨","🟥","⭐"].map(h => (
                    <div key={h} style={{ fontFamily:"Barlow", fontSize:11, color:"#475569", textAlign:"center", letterSpacing:1 }}>{h}</div>
                  ))}
                </div>
                {totals.map((t,i) => (
                  <div key={t.player} className="leaderboard-row" style={{
                    background: i===0&&(t.goals+t.assists)>0?"rgba(251,191,36,0.07)":"rgba(255,255,255,0.03)",
                    border: `1px solid ${i===0&&(t.goals+t.assists)>0?"rgba(251,191,36,0.2)":"rgba(255,255,255,0.05)"}`,
                  }}>
                    <div style={{ fontFamily:"Bebas Neue", fontSize:16, color:i<3?["#fbbf24","#94a3b8","#b45309"][i]:"#334155", textAlign:"center" }}>{i+1}</div>
                    <div style={{ fontFamily:"Barlow", fontSize:14, fontWeight:500, color:"#cbd5e1" }}>{t.player}</div>
                    <div style={{ fontFamily:"Bebas Neue", fontSize:20, color:t.goals>0?"#4db8ff":"#334155", textAlign:"center" }}>{t.goals}</div>
                    <div style={{ fontFamily:"Bebas Neue", fontSize:20, color:t.assists>0?"#34d399":"#334155", textAlign:"center" }}>{t.assists}</div>
                    <div style={{ fontFamily:"Bebas Neue", fontSize:20, color:t.yellowCards>0?"#fbbf24":"#334155", textAlign:"center" }}>{t.yellowCards}</div>
                    <div style={{ fontFamily:"Bebas Neue", fontSize:20, color:t.redCards>0?"#f87171":"#334155", textAlign:"center" }}>{t.redCards}</div>
                    <div style={{ fontFamily:"Bebas Neue", fontSize:20, color:t.mvps>0?"#fbbf24":"#334155", textAlign:"center" }}>{t.mvps}</div>
                  </div>
                ))}
              </div>
            )}

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
